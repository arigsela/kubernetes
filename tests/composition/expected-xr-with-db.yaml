# tests/composition/expected-xr-with-db.yaml
# Sorted by yq -P 'sort_keys(..)'. Keep alphabetic key order.
---
apiVersion: platform.arigsela.com/v1alpha1
kind: XApplication
metadata:
  annotations:
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/smoke-db-app
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/system: platform
  name: smoke-db-app
  namespace: platform-smoke
spec:
  dbNeeded: true
  dbStorage: 1Gi
  host: smoke-db-app.arigsela.com
  image: nginxinc/nginx-unprivileged:1.25-alpine
  port: 8080
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/smoke-db-app
    crossplane.io/composition-resource-name: deployment
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/system: platform
  labels:
    app.kubernetes.io/managed-by: crossplane
    app.kubernetes.io/name: smoke-db-app
    backstage.io/kubernetes-id: smoke-db-app
  name: smoke-db-app
  namespace: platform-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smoke-db-app
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: crossplane
        app.kubernetes.io/name: smoke-db-app
        backstage.io/kubernetes-id: smoke-db-app
    spec:
      containers:
        - env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: uri
                  name: smoke-db-app-db
          envFrom:
            - secretRef:
                name: smoke-db-app-db
          image: nginxinc/nginx-unprivileged:1.25-alpine
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          name: app
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
      imagePullSecrets:
        - name: ecr-auth
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/smoke-db-app
    crossplane.io/composition-resource-name: service
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/system: platform
  labels:
    app.kubernetes.io/managed-by: crossplane
    app.kubernetes.io/name: smoke-db-app
    backstage.io/kubernetes-id: smoke-db-app
  name: smoke-db-app
  namespace: platform-smoke
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8080
  selector:
    app.kubernetes.io/name: smoke-db-app
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/smoke-db-app
    cert-manager.io/cluster-issuer: letsencrypt-prod
    crossplane.io/composition-resource-name: ingress
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/system: platform
  labels:
    app.kubernetes.io/managed-by: crossplane
    app.kubernetes.io/name: smoke-db-app
    backstage.io/kubernetes-id: smoke-db-app
  name: smoke-db-app
  namespace: platform-smoke
spec:
  ingressClassName: nginx
  rules:
    - host: smoke-db-app.arigsela.com
      http:
        paths:
          - backend:
              service:
                name: smoke-db-app
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - smoke-db-app.arigsela.com
      secretName: smoke-db-app-tls
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  annotations:
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/smoke-db-app
    crossplane.io/composition-resource-name: dbcluster
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/system: platform
  labels:
    app.kubernetes.io/managed-by: crossplane
    app.kubernetes.io/name: smoke-db-app
    backstage.io/kubernetes-id: smoke-db-app
  name: smoke-db-app-db
  namespace: platform-smoke
spec:
  bootstrap:
    initdb:
      database: app
      owner: app
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  instances: 1
  storage:
    size: 1Gi
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  annotations:
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/smoke-db-app
    crossplane.io/composition-resource-name: externalsecret
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/system: platform
  labels:
    app.kubernetes.io/managed-by: crossplane
    app.kubernetes.io/name: smoke-db-app
    backstage.io/kubernetes-id: smoke-db-app
  name: smoke-db-app-db
  namespace: platform-smoke
spec:
  data:
    - remoteRef:
        key: platform-smoke/db
        property: dbname
      secretKey: dbname
    - remoteRef:
        key: platform-smoke/db
        property: host
      secretKey: host
    - remoteRef:
        key: platform-smoke/db
        property: jdbc-uri
      secretKey: jdbc-uri
    - remoteRef:
        key: platform-smoke/db
        property: password
      secretKey: password
    - remoteRef:
        key: platform-smoke/db
        property: pgpass
      secretKey: pgpass
    - remoteRef:
        key: platform-smoke/db
        property: port
      secretKey: port
    - remoteRef:
        key: platform-smoke/db
        property: uri
      secretKey: uri
    - remoteRef:
        key: platform-smoke/db
        property: username
      secretKey: username
  refreshInterval: 15s
  secretStoreRef:
    kind: SecretStore
    name: vault-backend
  target:
    creationPolicy: Owner
    name: smoke-db-app-db
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  annotations:
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/smoke-db-app
    crossplane.io/composition-resource-name: pushsecret
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/system: platform
  labels:
    app.kubernetes.io/managed-by: crossplane
    app.kubernetes.io/name: smoke-db-app
    backstage.io/kubernetes-id: smoke-db-app
  name: smoke-db-app-db-push
  namespace: platform-smoke
spec:
  data:
    - match:
        remoteRef:
          property: dbname
          remoteKey: platform-smoke/db
        secretKey: dbname
    - match:
        remoteRef:
          property: host
          remoteKey: platform-smoke/db
        secretKey: host
    - match:
        remoteRef:
          property: jdbc-uri
          remoteKey: platform-smoke/db
        secretKey: jdbc-uri
    - match:
        remoteRef:
          property: password
          remoteKey: platform-smoke/db
        secretKey: password
    - match:
        remoteRef:
          property: pgpass
          remoteKey: platform-smoke/db
        secretKey: pgpass
    - match:
        remoteRef:
          property: port
          remoteKey: platform-smoke/db
        secretKey: port
    - match:
        remoteRef:
          property: uri
          remoteKey: platform-smoke/db
        secretKey: uri
    - match:
        remoteRef:
          property: username
          remoteKey: platform-smoke/db
        secretKey: username
  deletionPolicy: Delete
  refreshInterval: 1h
  secretStoreRefs:
    - kind: SecretStore
      name: vault-backend
  selector:
    secret:
      name: smoke-db-app-db-app
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  annotations:
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/smoke-db-app
    crossplane.io/composition-resource-name: secretstore
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/system: platform
  labels:
    app.kubernetes.io/managed-by: crossplane
    app.kubernetes.io/name: smoke-db-app
    backstage.io/kubernetes-id: smoke-db-app
  name: vault-backend
  namespace: platform-smoke
spec:
  provider:
    vault:
      auth:
        kubernetes:
          mountPath: kubernetes
          role: platform-smoke
          serviceAccountRef:
            name: default
      path: k8s-secrets
      server: http://vault.vault.svc.cluster.local:8200
      version: v2
