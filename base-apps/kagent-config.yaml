apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-config
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Deploy with CRDs, before kagent main app
spec:
  project: default
  source:
    repoURL: https://github.com/arigsela/kubernetes
    targetRevision: deploy-kagent
    path: base-apps/kagent
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
