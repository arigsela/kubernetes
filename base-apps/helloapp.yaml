# ArgoCD Application for helloapp
# Sync wave 10 ensures XRD/Composition land before this app's XR.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helloapp
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/arigsela/kubernetes
    targetRevision: main
    path: base-apps/helloapp
    # catalog-info.yaml is a Backstage Component entity, not a Kubernetes
    # resource. Backstage reads it directly from GitHub (via /catalog-import
    # or auto-discovery). ArgoCD must skip it or sync fails with
    # "no matches for kind Component in version backstage.io/v1alpha1".
    directory:
      exclude: 'catalog-info.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: helloapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
