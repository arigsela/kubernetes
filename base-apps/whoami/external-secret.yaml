# Seed the Vault key k8s-secrets/whoami with your app's secrets;
# every property under it is synced into the whoami-secrets Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: whoami-secrets
  namespace: whoami
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: whoami-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: whoami
