apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-ecr-secret
  annotations:
    policies.kyverno.io/title: Generate ECR Secret for New Namespaces
    policies.kyverno.io/category: Image Pull
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Clones the ecr-registry pull secret from kube-system into newly
      created namespaces so ECR images can be pulled immediately.
      The ECR CronJob handles hourly token refresh across all namespaces.
spec:
  rules:
    - name: clone-ecr-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - default
                - kyverno
      generate:
        synchronize: false
        apiVersion: v1
        kind: Secret
        name: ecr-registry
        namespace: "{{request.object.metadata.name}}"
        clone:
          namespace: kube-system
          name: ecr-registry
