apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  # No ignoreDifferences: the agents whose tools/memory we customize are no longer
  # rendered by this chart. They are owned in Git under base-apps/kagent/agents/,
  # so Argo reconciles and self-heals them like any other manifest.
  source:
    chart: kagent
    repoURL: ghcr.io/kagent-dev/kagent/helm
    targetRevision: 0.9.11
    helm:
      valuesObject:
        # Database: use existing PostgreSQL with pgvector
        database:
          postgres:
            bundled:
              enabled: false
            urlFile: /etc/kagent/secrets/db-url
            vectorEnabled: true

        # Mount the database URL secret.
        controller:
          volumes:
            - name: db-secret
              secret:
                secretName: kagent-db-credentials
                items:
                  - key: db-url
                    path: db-url
          volumeMounts:
            - name: db-secret
              mountPath: /etc/kagent/secrets
              readOnly: true
          # OpenShell integration (Phase 2). Gateway runs in plain h2c mode
          # because the openshell chart v0.0.49 cannot be configured for
          # "server-TLS-only" — its gateway-config.yaml unconditionally
          # renders client_ca_path inside [openshell.gateway.tls], forcing
          # mTLS-required posture whenever TLS is enabled. And the kagent
          # controller still has no client-cert config fields as of v0.9.11
          # (sandboxbackend/openshell/config.go exposes only TLSCAPEM +
          # Insecure — no client keypair). So we drop
          # TLS entirely on the openshell side (server.disableTls=true in
          # base-apps/openshell.yaml) and dial insecure here.
          # Re-evaluate when either upstream fix lands.
          # See issue #306 and docs/superpowers/specs/2026-05-28-openshell-controller-mtls-design.md.
          env:
            - name: OPENSHELL_GATEWAY_URL
              value: "openshell.openshell.svc.cluster.local:8080"
            - name: OPENSHELL_INSECURE
              value: "true"

        # LLM provider: use Anthropic with existing secret
        providers:
          default: anthropic
          anthropic:
            provider: Anthropic
            model: claude-haiku-4-5-20251001
            apiKeySecretRef: kagent-anthropic
            apiKeySecretKey: ANTHROPIC_API_KEY

        # UI image override: custom Node-20 build for older HP server CPUs.
        # Upstream cr.kagent.dev/kagent-dev/kagent/ui ships Node 24, which needs
        # the x86-64-v2 instruction baseline → SIGILL on this hardware.
        #
        # This is a PERMANENT fork, not temporary scaffolding: upstream closed
        # https://github.com/kagent-dev/kagent/issues/1505 as `not_planned`
        # (2026-05-23), and v0.9.11 still builds on Node 24. Every chart bump
        # therefore requires a matching image rebuild.
        #
        # NOTE: Image must be built via base-apps/kagent/build/build.sh BEFORE
        # this PR merges to main, otherwise the kagent-ui pod will ImagePullBackOff.
        ui:
          image:
            registry: "852893458518.dkr.ecr.us-east-2.amazonaws.com"
            repository: "kagent-ui"
            tag: "0.9.11-node20"
            pullPolicy: IfNotPresent

        # Agent enablement.
        #
        # IMPORTANT: these are TOP-LEVEL chart keys (Helm subchart aliases —
        # the subchart conditions are `k8s-agent.enabled`, `helm-agent.enabled`,
        # ...). The chart has NO `agents:` map. This block previously nested them
        # under `agents:`, which Helm silently ignored, so none of it took effect:
        # every bundled agent ran enabled with default resources, including the
        # promql/cilium agents we believed were off.
        #
        # The two write-capable agents we actually use (k8s, istio) are disabled
        # here and owned in Git instead, under base-apps/kagent/agents/. They
        # need two fields the chart cannot express — spec.declarative.memory and
        # the HITL requireApproval gates on their destructive tools — which we
        # previously applied out-of-band with kubectl. Argo overwrote those
        # patches on every sync, silently removing the human-approval gate from
        # tools like k8s_delete_resource. ignoreDifferences does not prevent this
        # (it only suppresses drift detection), and RespectIgnoreDifferences is
        # ignored during sync when combined with ServerSideApply —
        # argoproj/argo-cd#8970 / #9678, reproduced on this cluster. Owning the
        # CRs makes both fields declarative and self-healed by Argo.
        #
        # observability-agent stays chart-managed: it is read-only, so it needs
        # no approval gates, and chart 0.9.10+ sets memory natively.
        k8s-agent:
          enabled: false
        istio-agent:
          enabled: false
        # Not used in this cluster. helm/kgateway/argo-rollouts are write-capable
        # and would need approval gates we no longer have a mechanism for, so
        # they are off rather than left running ungated. promql/cilium were meant
        # to be off already — the broken `agents:` nesting meant they have been
        # running all along.
        helm-agent:
          enabled: false
        kgateway-agent:
          enabled: false
        argo-rollouts-agent:
          enabled: false
        promql-agent:
          enabled: false
        cilium-manager-agent:
          enabled: false
        cilium-debug-agent:
          enabled: false
        cilium-policy-agent:
          enabled: false
        observability-agent:
          enabled: true
          memory:
            enabled: true
            modelConfigRef: embedding-model-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # OpenTelemetry tracing → Coroot OTLP receiver
        otel:
          tracing:
            enabled: true
            exporter:
              otlp:
                endpoint: "coroot-coroot.coroot.svc.cluster.local:4317"
                protocol: "grpc"
                insecure: true
          logging:
            enabled: true
            exporter:
              otlp:
                endpoint: "coroot-coroot.coroot.svc.cluster.local:4317"
                insecure: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
