apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  # Ignore diffs on Agent CRD tools and memory fields - managed separately via agent-patches
  ignoreDifferences:
    - group: kagent.dev
      kind: Agent
      jsonPointers:
        - /spec/declarative/tools
        - /spec/declarative/memory
  source:
    chart: kagent
    repoURL: ghcr.io/kagent-dev/kagent/helm
    targetRevision: 0.8.6
    helm:
      valuesObject:
        # Database: use existing PostgreSQL with pgvector
        database:
          postgres:
            bundled:
              enabled: false
            urlFile: /etc/kagent/secrets/db-url
            vectorEnabled: true

        # Mount the database URL secret as a file
        controller:
          volumes:
            - name: db-secret
              secret:
                secretName: kagent-db-credentials
                items:
                  - key: db-url
                    path: db-url
          volumeMounts:
            - name: db-secret
              mountPath: /etc/kagent/secrets
              readOnly: true

        # LLM provider: use Anthropic with existing secret
        providers:
          default: anthropic
          anthropic:
            provider: Anthropic
            model: claude-sonnet-4-6-20250514
            apiKeySecretRef: kagent-anthropic
            apiKeySecretKey: ANTHROPIC_API_KEY

        # Right-sized agent resources (Task 3.3)
        # Read-heavy agents: 512Mi limit; Write-heavy agents: keep 1Gi
        agents:
          k8s-agent:
            enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
          helm-agent:
            enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
          cilium-manager-agent:
            enabled: false
          # Read-heavy / read-only agents → reduced to 512Mi
          promql-agent:
            enabled: false
          observability-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          cilium-debug-agent:
            enabled: false
          cilium-policy-agent:
            enabled: false
          argo-rollouts-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          istio-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          kgateway-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi

        # OpenTelemetry tracing → Coroot OTLP receiver
        otel:
          tracing:
            enabled: true
            exporter:
              otlp:
                endpoint: "coroot-coroot.coroot.svc.cluster.local:4317"
                protocol: "grpc"
                insecure: true
          logging:
            enabled: true
            exporter:
              otlp:
                endpoint: "coroot-coroot.coroot.svc.cluster.local:4317"
                insecure: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
