apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  # Ignore diffs on Agent CRD tools and memory fields - managed separately via agent-patches
  ignoreDifferences:
    - group: kagent.dev
      kind: Agent
      jsonPointers:
        - /spec/declarative/tools
        - /spec/declarative/memory
  source:
    chart: kagent
    repoURL: ghcr.io/kagent-dev/kagent/helm
    targetRevision: 0.9.4
    helm:
      valuesObject:
        # Database: use existing PostgreSQL with pgvector
        database:
          postgres:
            bundled:
              enabled: false
            urlFile: /etc/kagent/secrets/db-url
            vectorEnabled: true

        # Mount the database URL secret as a file
        controller:
          volumes:
            - name: db-secret
              secret:
                secretName: kagent-db-credentials
                items:
                  - key: db-url
                    path: db-url
          volumeMounts:
            - name: db-secret
              mountPath: /etc/kagent/secrets
              readOnly: true
          # OpenShell integration (Phase 2). OPENSHELL_INSECURE skips TLS
          # verification because the chart-issued openshell-ca-tls isn't yet
          # mounted into the controller; tighten by mounting that CA and
          # flipping this to "false" in a follow-up.
          env:
            - name: OPENSHELL_GATEWAY_URL
              value: "https://openshell.openshell.svc.cluster.local:8080"
            - name: OPENSHELL_INSECURE
              value: "true"

        # LLM provider: use Anthropic with existing secret
        providers:
          default: anthropic
          anthropic:
            provider: Anthropic
            model: claude-haiku-4-5-20251001
            apiKeySecretRef: kagent-anthropic
            apiKeySecretKey: ANTHROPIC_API_KEY

        # UI image override: custom Node-20 build for older HP server CPUs.
        # Upstream cr.kagent.dev/kagent-dev/kagent/ui:0.9.4 ships Node 24 with
        # x86-64-v2 baseline → SIGILL on this hardware.
        # Track upstream: https://github.com/kagent-dev/kagent/issues/1505
        # NOTE: Image must be built via base-apps/kagent/build/build.sh BEFORE
        # this PR merges to main, otherwise the kagent-ui pod will ImagePullBackOff.
        ui:
          image:
            registry: "852893458518.dkr.ecr.us-east-2.amazonaws.com"
            repository: "kagent-ui"
            tag: "0.9.4-node20"
            pullPolicy: IfNotPresent

        # Right-sized agent resources (Task 3.3)
        # Read-heavy agents: 512Mi limit; Write-heavy agents: keep 1Gi
        agents:
          k8s-agent:
            enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
          helm-agent:
            enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
          cilium-manager-agent:
            enabled: false
          # Read-heavy / read-only agents → reduced to 512Mi
          promql-agent:
            enabled: false
          observability-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          cilium-debug-agent:
            enabled: false
          cilium-policy-agent:
            enabled: false
          argo-rollouts-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          istio-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          kgateway-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi

        # OpenTelemetry tracing → Coroot OTLP receiver
        otel:
          tracing:
            enabled: true
            exporter:
              otlp:
                endpoint: "coroot-coroot.coroot.svc.cluster.local:4317"
                protocol: "grpc"
                insecure: true
          logging:
            enabled: true
            exporter:
              otlp:
                endpoint: "coroot-coroot.coroot.svc.cluster.local:4317"
                insecure: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
