apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  # Ignore diffs on Agent CRD tools and memory fields - managed separately via
  # base-apps/kagent/post-deploy-patches.sh (HITL requireApproval + memory config).
  #
  # ignoreDifferences alone only suppresses drift *detection*. It does NOT stop a
  # sync from overwriting these fields, so any sync of this app (a chart bump, a
  # manual sync) silently strips the requireApproval gates off the write-capable
  # agents — verified live during the 0.9.4 -> 0.9.11 bump. RespectIgnoreDifferences
  # pre-patches the ignored paths out of the desired state before apply, so the live
  # (patched) values survive.
  #
  # Safe on a fresh install: the option is only effective when the resource already
  # exists. With no live state, Argo applies the desired state as-is, so the chart's
  # tools/memory land normally on first create.
  ignoreDifferences:
    - group: kagent.dev
      kind: Agent
      jsonPointers:
        - /spec/declarative/tools
        - /spec/declarative/memory
  source:
    chart: kagent
    repoURL: ghcr.io/kagent-dev/kagent/helm
    targetRevision: 0.9.11
    helm:
      valuesObject:
        # Database: use existing PostgreSQL with pgvector
        database:
          postgres:
            bundled:
              enabled: false
            urlFile: /etc/kagent/secrets/db-url
            vectorEnabled: true

        # Mount the database URL secret.
        controller:
          volumes:
            - name: db-secret
              secret:
                secretName: kagent-db-credentials
                items:
                  - key: db-url
                    path: db-url
          volumeMounts:
            - name: db-secret
              mountPath: /etc/kagent/secrets
              readOnly: true
          # OpenShell integration (Phase 2). Gateway runs in plain h2c mode
          # because the openshell chart v0.0.49 cannot be configured for
          # "server-TLS-only" — its gateway-config.yaml unconditionally
          # renders client_ca_path inside [openshell.gateway.tls], forcing
          # mTLS-required posture whenever TLS is enabled. And the kagent
          # controller still has no client-cert config fields as of v0.9.11
          # (sandboxbackend/openshell/config.go exposes only TLSCAPEM +
          # Insecure — no client keypair). So we drop
          # TLS entirely on the openshell side (server.disableTls=true in
          # base-apps/openshell.yaml) and dial insecure here.
          # Re-evaluate when either upstream fix lands.
          # See issue #306 and docs/superpowers/specs/2026-05-28-openshell-controller-mtls-design.md.
          env:
            - name: OPENSHELL_GATEWAY_URL
              value: "openshell.openshell.svc.cluster.local:8080"
            - name: OPENSHELL_INSECURE
              value: "true"

        # LLM provider: use Anthropic with existing secret
        providers:
          default: anthropic
          anthropic:
            provider: Anthropic
            model: claude-haiku-4-5-20251001
            apiKeySecretRef: kagent-anthropic
            apiKeySecretKey: ANTHROPIC_API_KEY

        # UI image override: custom Node-20 build for older HP server CPUs.
        # Upstream cr.kagent.dev/kagent-dev/kagent/ui ships Node 24, which needs
        # the x86-64-v2 instruction baseline → SIGILL on this hardware.
        #
        # This is a PERMANENT fork, not temporary scaffolding: upstream closed
        # https://github.com/kagent-dev/kagent/issues/1505 as `not_planned`
        # (2026-05-23), and v0.9.11 still builds on Node 24. Every chart bump
        # therefore requires a matching image rebuild.
        #
        # NOTE: Image must be built via base-apps/kagent/build/build.sh BEFORE
        # this PR merges to main, otherwise the kagent-ui pod will ImagePullBackOff.
        ui:
          image:
            registry: "852893458518.dkr.ecr.us-east-2.amazonaws.com"
            repository: "kagent-ui"
            tag: "0.9.11-node20"
            pullPolicy: IfNotPresent

        # Right-sized agent resources (Task 3.3)
        # Read-heavy agents: 512Mi limit; Write-heavy agents: keep 1Gi
        agents:
          k8s-agent:
            enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
          helm-agent:
            enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
          cilium-manager-agent:
            enabled: false
          # Read-heavy / read-only agents → reduced to 512Mi
          promql-agent:
            enabled: false
          observability-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          cilium-debug-agent:
            enabled: false
          cilium-policy-agent:
            enabled: false
          argo-rollouts-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          istio-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          kgateway-agent:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi

        # OpenTelemetry tracing → Coroot OTLP receiver
        otel:
          tracing:
            enabled: true
            exporter:
              otlp:
                endpoint: "coroot-coroot.coroot.svc.cluster.local:4317"
                protocol: "grpc"
                insecure: true
          logging:
            enabled: true
            exporter:
              otlp:
                endpoint: "coroot-coroot.coroot.svc.cluster.local:4317"
                insecure: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
