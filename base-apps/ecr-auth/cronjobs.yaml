apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-credentials-sync
  namespace: kube-system
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 3  # Keep last 3 successful jobs
  failedJobsHistoryLimit: 3       # Keep last 3 failed jobs
  concurrencyPolicy: Forbid        # Don't run concurrent jobs
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600  # Delete job 1 hour after completion
      template:
        spec:
          nodeSelector:
            node.kubernetes.io/workload: infrastructure
          tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
          serviceAccountName: ecr-credentials-sync
          containers:
          - name: ecr-credentials-sync
            image: heyvaldemar/aws-kubectl:latest
            env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_REGION
            command:
            - /bin/sh
            - -c
            - |
              # Create/update ECR pull secret in kube-system as the single source of truth.
              # Kyverno policy sync-ecr-secret clones this to all application namespaces.
              TOKEN=$(aws ecr get-login-password --region $AWS_REGION)
              echo "Syncing ECR credentials in kube-system (source for Kyverno sync)"
              kubectl create secret docker-registry ecr-registry \
                --docker-server=852893458518.dkr.ecr.$AWS_REGION.amazonaws.com \
                --docker-username=AWS \
                --docker-password=$TOKEN \
                -n kube-system \
                --dry-run=client -o yaml | kubectl apply -f -
          restartPolicy: OnFailure

