apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-credentials-sync
  namespace: kube-system
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 3  # Keep last 3 successful jobs
  failedJobsHistoryLimit: 3       # Keep last 3 failed jobs
  concurrencyPolicy: Forbid        # Don't run concurrent jobs
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600  # Delete job 1 hour after completion
      template:
        spec:
          nodeSelector:
            node.kubernetes.io/workload: infrastructure
          tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
          serviceAccountName: ecr-credentials-sync
          containers:
          - name: ecr-credentials-sync
            image: heyvaldemar/aws-kubectl:latest
            env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_REGION
            command:
            - /bin/sh
            - -c
            - |
              # Get a fresh ECR token
              TOKEN=$(aws ecr get-login-password --region $AWS_REGION)
              DOCKER_SERVER="852893458518.dkr.ecr.$AWS_REGION.amazonaws.com"

              # Discover all namespaces, excluding system namespaces
              NAMESPACES=$(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}')
              EXCLUDE="kube-system kube-public kube-node-lease default kyverno"

              for NS in $NAMESPACES; do
                # Skip excluded namespaces
                echo "$EXCLUDE" | grep -qw "$NS" && continue

                echo "Syncing ECR credentials in namespace $NS"
                kubectl create secret docker-registry ecr-registry \
                  --docker-server=$DOCKER_SERVER \
                  --docker-username=AWS \
                  --docker-password=$TOKEN \
                  -n $NS \
                  --dry-run=client -o yaml | kubectl apply -f -
              done
          restartPolicy: OnFailure

