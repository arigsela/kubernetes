apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-qwen
  namespace: openclaw-qwen
  labels:
    app: openclaw-qwen
    app.kubernetes.io/name: openclaw-qwen
    app.kubernetes.io/part-of: platform-ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw-qwen
  template:
    metadata:
      labels:
        app: openclaw-qwen
        app.kubernetes.io/name: openclaw-qwen
    spec:
      nodeSelector:
        node.kubernetes.io/workload: application
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Seed the config + AGENTS.md into the writable HOME (the ConfigMap is
        # read-only; OpenClaw needs a writable ~/.openclaw for sessions/state).
        - name: init-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace
              cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: home
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
      containers:
        - name: gateway
          # Official OpenClaw image + command (docs.openclaw.ai/install/kubernetes).
          image: ghcr.io/openclaw/openclaw:slim
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            # Token auth -> operator role for connecting clients (the TUI via exec
            # inherits this env and authenticates as operator, so it can send).
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-qwen-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            # Slack Socket-Mode tokens (channels.slack SecretRefs point at these).
            # The openclaw-slack Secret is created out-of-band (not in git) so the
            # real tokens never touch the repo.
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-slack
                  key: SLACK_APP_TOKEN
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-slack
                  key: SLACK_BOT_TOKEN
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: home
              mountPath: /home/node/.openclaw
            # Also expose the workspace at /workspace — the model hard-assumes
            # that path for file writes. Same PVC dir as ~/.openclaw/workspace
            # (subPath), so /workspace and the configured workspace are identical.
            - name: home
              mountPath: /workspace
              subPath: workspace
            - name: tmp
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: openclaw-qwen-home
        - name: config
          configMap:
            name: openclaw-qwen-config
        - name: tmp
          emptyDir: {}
