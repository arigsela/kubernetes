apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-qwen-config
  namespace: openclaw-qwen
  labels:
    app: openclaw-qwen
    app.kubernetes.io/name: openclaw-qwen
    app.kubernetes.io/part-of: platform-ai
data:
  # Follows OpenClaw's official k8s config (docs.openclaw.ai/install/kubernetes):
  # gateway.auth.mode "token" — shared-secret auth that grants the OPERATOR role,
  # so the TUI can actually send (unlike "none", which is read-only). The token
  # comes from the OPENCLAW_GATEWAY_TOKEN env (secret.yaml). The `openai` provider
  # points at Qwen2.5-Coder-14B served by LM Studio on the gaming PC's GPU
  # (http://10.0.1.200:1234, same LAN subnet as the nodes) — a GPU model answers in
  # seconds vs. minutes for the CPU 0.8B, and it's the ~20K agent prompt's real
  # home. Requires LM Studio to load the model with context length >= ~24K.
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "port": 18789,
        "auth": { "mode": "token" },
        "controlUi": { "enabled": true }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "openai": {
            "baseUrl": "http://10.0.1.200:1234/v1",
            "apiKey": "not-needed",
            "auth": "api-key",
            "api": "openai-completions",
            "timeoutSeconds": 600,
            "models": [ { "id": "qwen2.5-coder-14b-instruct", "name": "Qwen2.5-Coder-14B (LM Studio, GPU)" } ]
          }
        }
      },
      "agents": {
        "defaults": { "workspace": "/workspace", "model": { "primary": "openai/qwen2.5-coder-14b-instruct" }, "timeoutSeconds": 600, "sandbox": { "mode": "off" }, "silentReply": { "group": "disallow" } },
        "list": [ { "id": "default", "name": "OpenClaw Assistant", "workspace": "/workspace" } ]
      },
      "cron": { "enabled": false },
      "channels": {
        "slack": {
          "enabled": true,
          "mode": "socket",
          "appToken": { "source": "env", "provider": "default", "id": "SLACK_APP_TOKEN" },
          "botToken": { "source": "env", "provider": "default", "id": "SLACK_BOT_TOKEN" }
        }
      },
      "plugins": {
        "allow": ["slack"],
        "entries": { "slack": { "enabled": true } }
      },
      "tools": {
        "elevated": {
          "enabled": true,
          "allowFrom": {
            "webchat": ["exec", "process", "write", "edit", "read", "apply_patch"],
            "slack": ["exec", "process", "write", "edit", "read", "apply_patch"]
          }
        }
      }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful coding/ops assistant running in a Linux sandbox (a
    Kubernetes pod), backed by a Qwen2.5-Coder-14B model on a GPU. Be clear and concise.

    ## Your environment (important)
    - Your workspace and working directory is: /workspace
      Create and edit files there (e.g. /workspace/notes.txt, or just notes.txt).
      Do NOT write outside /workspace — the rest of the filesystem is read-only.
    - You can run shell commands with the exec tool. Available: bash, python3,
      node, npm, git, curl, grep/sed/awk. NOT available: gcc, make, jq, wget.
    - Keep tasks small and concrete; check each step's output before continuing.
