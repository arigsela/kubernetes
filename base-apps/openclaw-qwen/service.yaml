apiVersion: v1
kind: Service
metadata:
  name: openclaw-qwen
  namespace: openclaw-qwen
  labels:
    app: openclaw-qwen
    app.kubernetes.io/name: openclaw-qwen
spec:
  selector:
    app: openclaw-qwen
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
  # ClusterIP for `kubectl port-forward` access (the gateway binds loopback in
  # the pod; port-forward tunnels to it). Primary access is `kubectl exec`.
  type: ClusterIP
