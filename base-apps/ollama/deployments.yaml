apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        node.kubernetes.io/workload: application
      initContainers:
        - name: pull-model
          image: ollama/ollama:0.20.5
          command:
            - sh
            - -c
            - |
              # Start ollama server in background, pull the model, then stop
              ollama serve &
              SERVER_PID=$!
              sleep 5
              echo "Pulling nomic-embed-text model..."
              ollama pull nomic-embed-text
              echo "Model pull complete"
              kill $SERVER_PID
              wait $SERVER_PID 2>/dev/null || true
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
      containers:
        - name: ollama
          image: ollama/ollama:0.20.5
          ports:
            - containerPort: 11434
              name: http
          env:
            # Keep the embedding model resident instead of unloading it after the
            # default 5m idle. On CPU-only Ollama the cold reload of nomic-embed-text
            # took ~2m43s (measured), and was the dominant latency source for kagent
            # agents (e.g. homelab-knowledge) whenever they were used after a quiet
            # period. The model is ~274MB, so pinning it fits within the limit below.
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              # CPU-only embedding is CPU-bound and the node has ample headroom;
              # more cores cut warm-embed latency (was ~1-7s/call) and the one-time
              # model load on pod restart. Memory raised so the always-resident
              # model can't OOM the pod.
              cpu: "3"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc
