apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        node.kubernetes.io/workload: application
      initContainers:
        - name: pull-model
          image: ollama/ollama:0.20.5
          command:
            - sh
            - -c
            - |
              # Start ollama server in background, pull the model, then stop
              ollama serve &
              SERVER_PID=$!
              sleep 5
              echo "Pulling nomic-embed-text model..."
              ollama pull nomic-embed-text
              echo "Model pull complete"
              kill $SERVER_PID
              wait $SERVER_PID 2>/dev/null || true
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
      containers:
        - name: ollama
          image: ollama/ollama:0.20.5
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc
