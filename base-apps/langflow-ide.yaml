apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: langflow-ide
  namespace: argo-cd
spec:
  project: default
  source:
    chart: langflow-ide
    repoURL: https://langflow-ai.github.io/langflow-helm-charts
    targetRevision: 0.1.1
    helm:
      releaseName: langflow-ide
      values: |
        postgresql:
          enabled: false
        langflow:
          backend:
            sqlite:
              enabled: false
            externalDatabase:
              enabled: true
              driver:
                value: "postgresql"
              host:
                valueFrom:
                  secretKeyRef:
                    name: langflow-db-secrets
                    key: db-host
              port:
                value: "5432"
              database:
                valueFrom:
                  secretKeyRef:
                    name: langflow-db-secrets
                    key: db-name
              user:
                valueFrom:
                  secretKeyRef:
                    name: langflow-db-secrets
                    key: db-user
              password:
                valueFrom:
                  secretKeyRef:
                    name: langflow-db-secrets
                    key: db-password
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "2000m"
                memory: "4Gi"
            securityContext:
              runAsUser: 1000
              runAsNonRoot: true
              readOnlyRootFilesystem: true
            livenessProbe:
              httpGet:
                path: /health
                port: 7860
              initialDelaySeconds: 60
              periodSeconds: 30
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /health
                port: 7860
              initialDelaySeconds: 30
              periodSeconds: 10
              failureThreshold: 3
            extraVolumeMounts:
              - name: tmp
                mountPath: /tmp
              - name: langflow-data
                mountPath: /app/data
              - name: langflow-flows
                mountPath: /app/flows
            extraEnv:
              - name: ANTHROPIC_API_KEY
                valueFrom:
                  secretKeyRef:
                    name: langflow-api-secrets
                    key: anthropic-api-key
          frontend:
            enabled: true
            resources:
              requests:
                cpu: "300m"
                memory: "512Mi"
              limits:
                cpu: "500m"
                memory: "1Gi"
            securityContext:
              runAsUser: 1000
              runAsNonRoot: true
              readOnlyRootFilesystem: true
        extraVolumes:
          - name: tmp
            emptyDir: {}
          - name: langflow-data
            emptyDir: {}
          - name: langflow-flows
            emptyDir: {}
        nodeSelector:
          node.kubernetes.io/workload: application
  destination:
    server: https://kubernetes.default.svc
    namespace: langflow-ide
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
