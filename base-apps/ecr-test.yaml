apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecr-test
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/arigsela/kubernetes
    targetRevision: feat/kyverno-generate-ecr-new-ns
    path: base-apps/ecr-test
  destination:
    server: https://kubernetes.default.svc
    namespace: ecr-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
