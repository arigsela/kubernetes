apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: dex
  namespace: dex
  annotations:
    agent-docs/path: docs.md
    backstage.io/kubernetes-label-selector: 'app=dex'
    backstage.io/kubernetes-namespace: dex
  tags: [oidc, authentication, github, vault]
spec:
  type: service
  lifecycle: production
  owner: group:default/platform
  system: default/platform-automation
  providesApis:
    - default/dex-oidc-api
  dependsOn:
    - resource:vault/vault
