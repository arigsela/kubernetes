apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  name: argo-workflows
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.45.19
    helm:
      releaseName: argo-workflows
      values: |
        controller:
          workflowNamespaces:
            - argo-workflows
          nodeSelector:
            node.kubernetes.io/workload: infrastructure
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        artifactRepository:
          archiveLogs: true
          s3:
            endpoint: s3.amazonaws.com
            bucket: asela-argo-workflows-artifacts
            region: us-east-1
            keyFormat: "{{workflow.namespace}}/{{workflow.name}}/{{pod.name}}"
            accessKeySecret:
              name: argo-workflows-s3-creds
              key: username
            secretKeySecret:
              name: argo-workflows-s3-creds
              key: attribute.secret
        server:
          enabled: true
          authModes:
            - server
          nodeSelector:
            node.kubernetes.io/workload: infrastructure
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-workflows
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
