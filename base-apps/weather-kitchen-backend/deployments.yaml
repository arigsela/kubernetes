apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-kitchen-backend
  namespace: weather-kitchen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-kitchen-backend
  template:
    metadata:
      labels:
        app: weather-kitchen-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        node.kubernetes.io/workload: application
      containers:
      - name: weather-kitchen-backend
        image: 852893458518.dkr.ecr.us-east-2.amazonaws.com/weather-kitchen-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: weather-kitchen-backend-config
        - secretRef:
            name: weather-kitchen-backend-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      imagePullSecrets:
      - name: ecr-registry
