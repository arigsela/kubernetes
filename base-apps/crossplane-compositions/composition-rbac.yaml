# base-apps/crossplane-compositions/composition-rbac.yaml
# RBAC extension for the Crossplane controller's ServiceAccount.
#
# Why this exists:
#   Crossplane v2 namespaced XRs use the controller's own SA
#   (system:serviceaccount:crossplane-system:crossplane) to apply composed
#   resources into target namespaces. The default `crossplane` ClusterRole
#   shipped by the chart covers Deployments, Services, Secrets, ServiceAccounts,
#   ConfigMaps — but NOT Ingresses or CNPG Clusters.
#
#   Without this extension, our `application` Composition fails to compose its
#   Ingress child with:
#     ingresses.networking.k8s.io is forbidden:
#     User "system:serviceaccount:crossplane-system:crossplane" cannot patch
#     resource "ingresses" in API group "networking.k8s.io" in the namespace ...
#
#   And the dbNeeded path would similarly fail on postgresql.cnpg.io/clusters.
#
# How it works:
#   The `rbac.crossplane.io/aggregate-to-crossplane: "true"` label causes the
#   Crossplane chart's rbac-manager to aggregate these rules into the active
#   `crossplane` ClusterRole. No ClusterRoleBinding is needed — the existing
#   binding to the `crossplane` SA picks up the aggregated rules automatically.
#
# Sync wave 1 ensures this lands alongside / before the Function (also wave 1)
# and the Composition (wave 3) inside this ArgoCD app.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane:compositions:application
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # CNPG Cluster + status. The /status subresource is required for Crossplane's
  # informer to sync — without it, compose fails with:
  #   "Timeout: failed waiting for *unstructured.Unstructured Informer to sync"
  # because Crossplane can't read back the Cluster's reconciled state.
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "clusters/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # External Secrets Operator resources — v1.2 IDP apps with `dbNeeded: true`
  # have the Composition emit SecretStore / PushSecret / ExternalSecret per
  # namespace to round-trip CNPG-generated DB creds through Vault. Crossplane
  # needs full lifecycle access plus /status for readiness signaling.
  - apiGroups: ["external-secrets.io"]
    resources:
      - secretstores
      - secretstores/status
      - pushsecrets
      - pushsecrets/status
      - externalsecrets
      - externalsecrets/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # AWS S3 — v1.3 IDP apps with s3Needed:true. Crossplane SA composes Bucket
  # resources into target namespaces. /status subresource needed for informer sync
  # (same root cause as v1.2.1's CNPG /status fix).
  - apiGroups: ["s3.aws.upbound.io"]
    resources:
      - buckets
      - buckets/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # AWS IAM — v1.3 IDP apps with s3Needed:true. User, UserPolicy, AccessKey
  # for dedicated per-app IAM credentials. /status subresource needed for informer
  # sync (same root cause as v1.2.1's CNPG /status fix).
  - apiGroups: ["iam.aws.upbound.io"]
    resources:
      - users
      - users/status
      - userpolicies
      - userpolicies/status
      - accesskeys
      - accesskeys/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
