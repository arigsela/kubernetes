# base-apps/crossplane-compositions/xrd-application.yaml
# XApplication — the developer-facing API for "I have an image, run it."
# Namespaced (Crossplane v2 default). Schema is v1alpha1 — we will iterate.
# Image pull secret, health probes, resource limits, kubernetes-id label etc.
# are platform defaults set by the Composition, not XR fields.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xapplications.platform.arigsela.com
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  scope: Namespaced
  group: platform.arigsela.com
  names:
    kind: XApplication
    plural: xapplications
  defaultCompositionRef:
    name: application
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [image, host, port]
              properties:
                image:
                  type: string
                  description: "Full container image ref including tag, e.g. nginx:1.25"
                host:
                  type: string
                  description: "FQDN for the public Ingress, e.g. my-app.arigsela.com"
                port:
                  type: integer
                  default: 8080
                  minimum: 1
                  maximum: 65535
                replicas:
                  type: integer
                  default: 2
                  minimum: 1
                  maximum: 10
                healthCheckPath:
                  type: string
                  default: "/"
                  pattern: "^/.*"
                  description: |
                    HTTP path for liveness and readiness probes. Defaults to '/'
                    which works for most images (nginx, generic web servers).
                    Override for images that expose a dedicated health endpoint
                    (e.g. '/api/health', '/actuator/health').
                env:
                  type: array
                  description: "Plain-text env vars; never use for secrets"
                  items:
                    type: object
                    required: [name, value]
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                dbNeeded:
                  type: boolean
                  default: false
                dbStorage:
                  type: string
                  default: "1Gi"
                s3Needed:
                  type: boolean
                  default: false
                  description: |
                    When true, the Composition provisions an S3 bucket + dedicated
                    IAM user + S3-RW-on-own-bucket policy + access key, and routes
                    AWS credentials through Vault. The workload Deployment receives
                    AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, and
                    BUCKET_NAME env vars (zero application-side configuration).
                    WARNING: bucket is forceDestroy:true — contents are permanently
                    deleted on teardown.
                s3Versioning:
                  type: boolean
                  default: false
                  description: |
                    When true (and s3Needed:true), emits BucketVersioning resource enabling
                    object versioning on the bucket. Useful for recovery from accidental
                    deletes or overwrites.
                    Note: AWS only supports `Suspended` (not full disable) once enabled —
                    flipping back to false suspends versioning but doesn't delete history.
                s3LifecycleDays:
                  type: integer
                  default: 0
                  minimum: 0
                  description: |
                    When > 0 (and s3Needed:true), emits BucketLifecycleConfiguration with a
                    single rule that expires all objects after N days. When 0, no lifecycle
                    rule is created.
                    Common values: 7 (transient logs), 30 (build artifacts), 365 (compliance
                    retention).
                s3CorsEnabled:
                  type: boolean
                  default: false
                  description: |
                    When true (and s3Needed:true), emits BucketCorsConfiguration with
                    permissive defaults: allow all origins, GET/PUT/POST/DELETE/HEAD methods,
                    all headers, max-age 3600s. Useful for web apps that load assets directly
                    from S3.
                    For granular CORS configuration, see v1.5+ (deferred).
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
