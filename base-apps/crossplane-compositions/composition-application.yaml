# base-apps/crossplane-compositions/composition-application.yaml
# Application — single Composition for XApplication.
# Pipeline: one step, function-python, with the script that maps XR spec to
# Deployment + Service + Ingress + (Phase 2.3) optional CNPG Cluster.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: application
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  compositeTypeRef:
    apiVersion: platform.arigsela.com/v1alpha1
    kind: XApplication
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function import resource

          STD_LABELS_TEMPLATE = {
              "app.kubernetes.io/name": None,
              "app.kubernetes.io/managed-by": "crossplane",
              "backstage.io/kubernetes-id": None,
          }

          def std_labels(name):
              labels = dict(STD_LABELS_TEMPLATE)
              labels["app.kubernetes.io/name"] = name
              labels["backstage.io/kubernetes-id"] = name
              return labels

          TERASKY_ANNOTATION_PREFIXES = ("terasky.backstage.io/", "backstage.io/")

          def std_annotations(xr_annotations, resource_name):
              """Copy TeraSky/Backstage annotations from the XR + add per-resource name."""
              copied = {
                  k: v for k, v in (xr_annotations or {}).items()
                  if k.startswith(TERASKY_ANNOTATION_PREFIXES)
              }
              copied["crossplane.io/composition-resource-name"] = resource_name
              return copied

          # Canonical keys CNPG auto-generates in <name>-db-app. Names are preserved
          # verbatim through Vault → ESO → projected Secret so workload env vars stay
          # byte-identical to v1.1 behavior. (Renaming uri→DATABASE_URL etc. is a
          # separate v1 ergonomic improvement, NOT in v1.2 scope.)
          DB_SECRET_KEYS = ["dbname", "host", "jdbc-uri", "password",
                            "pgpass", "port", "uri", "username"]

          # AWS account + region constants. Confirmed from existing default
          # ProviderConfig (status shows 10 resources using it) + chores-tracker-backend
          # ECR image refs. Single account for all v1.x infra.
          AWS_ACCOUNT_ID = "852893458518"
          AWS_REGION = "us-east-2"

          def make_secret_store(name, namespace, annotations):
              return {
                  "apiVersion": "external-secrets.io/v1beta1",
                  "kind": "SecretStore",
                  "metadata": {
                      "name": "vault-backend",
                      "namespace": namespace,
                      "labels": std_labels(name),
                      "annotations": annotations,
                  },
                  "spec": {
                      "provider": {
                          "vault": {
                              "server": "http://vault.vault.svc.cluster.local:8200",
                              "path": "k8s-secrets",
                              "version": "v2",
                              "auth": {
                                  "kubernetes": {
                                      "mountPath": "kubernetes",
                                      "role": namespace,
                                      "serviceAccountRef": {"name": "default"},
                                  },
                              },
                          },
                      },
                  },
              }

          def make_push_secret(name, namespace, annotations):
              return {
                  "apiVersion": "external-secrets.io/v1alpha1",
                  "kind": "PushSecret",
                  "metadata": {
                      "name": f"{name}-db-push",
                      "namespace": namespace,
                      "labels": std_labels(name),
                      "annotations": annotations,
                  },
                  "spec": {
                      "refreshInterval": "5m",
                      "deletionPolicy": "Delete",
                      "secretStoreRefs": [
                          {"name": "vault-backend", "kind": "SecretStore"},
                      ],
                      "selector": {
                          "secret": {"name": f"{name}-db-app"},
                      },
                      "data": [
                          {
                              "match": {
                                  "secretKey": k,
                                  "remoteRef": {
                                      "remoteKey": f"{namespace}/db",
                                      "property": k,
                                  },
                              },
                          }
                          for k in DB_SECRET_KEYS
                      ],
                  },
              }

          def make_external_secret(name, namespace, annotations):
              return {
                  "apiVersion": "external-secrets.io/v1beta1",
                  "kind": "ExternalSecret",
                  "metadata": {
                      "name": f"{name}-db",
                      "namespace": namespace,
                      "labels": std_labels(name),
                      "annotations": annotations,
                  },
                  "spec": {
                      "refreshInterval": "15s",
                      "secretStoreRef": {
                          "name": "vault-backend",
                          "kind": "SecretStore",
                      },
                      "target": {
                          "name": f"{name}-db",
                          "creationPolicy": "Owner",
                      },
                      "data": [
                          {
                              "secretKey": k,
                              "remoteRef": {
                                  "key": f"{namespace}/db",
                                  "property": k,
                              },
                          }
                          for k in DB_SECRET_KEYS
                      ],
                  },
              }

          def make_aws_push_secret(name, namespace, annotations):
              """Pushes 2 keys (id + secret) from <name>-aws-key (AccessKey-generated)
              to Vault path k8s-secrets/<namespace>/aws-creds with key remap to
              AWS SDK convention (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)."""
              return {
                  "apiVersion": "external-secrets.io/v1alpha1",
                  "kind": "PushSecret",
                  "metadata": {
                      "name": f"{name}-aws-push",
                      "namespace": namespace,
                      "labels": std_labels(name),
                      "annotations": annotations,
                  },
                  "spec": {
                      "refreshInterval": "5m",
                      "deletionPolicy": "Delete",
                      "secretStoreRefs": [
                          {"name": "vault-backend", "kind": "SecretStore"},
                      ],
                      "selector": {
                          "secret": {"name": f"{name}-aws-key"},
                      },
                      "data": [
                          {
                              "match": {
                                  "secretKey": "username",
                                  "remoteRef": {
                                      "remoteKey": f"{namespace}/aws-creds",
                                      "property": "AWS_ACCESS_KEY_ID",
                                  },
                              },
                          },
                          {
                              "match": {
                                  "secretKey": "password",
                                  "remoteRef": {
                                      "remoteKey": f"{namespace}/aws-creds",
                                      "property": "AWS_SECRET_ACCESS_KEY",
                                  },
                              },
                          },
                      ],
                  },
              }

          def make_aws_external_secret(name, namespace, annotations):
              """Reads from Vault → projects to K8s Secret <name>-aws with AWS SDK-named keys."""
              return {
                  "apiVersion": "external-secrets.io/v1beta1",
                  "kind": "ExternalSecret",
                  "metadata": {
                      "name": f"{name}-aws",
                      "namespace": namespace,
                      "labels": std_labels(name),
                      "annotations": annotations,
                  },
                  "spec": {
                      "refreshInterval": "15s",
                      "secretStoreRef": {
                          "name": "vault-backend",
                          "kind": "SecretStore",
                      },
                      "target": {
                          "name": f"{name}-aws",
                          "creationPolicy": "Owner",
                      },
                      "data": [
                          {
                              "secretKey": "AWS_ACCESS_KEY_ID",
                              "remoteRef": {
                                  "key": f"{namespace}/aws-creds",
                                  "property": "AWS_ACCESS_KEY_ID",
                              },
                          },
                          {
                              "secretKey": "AWS_SECRET_ACCESS_KEY",
                              "remoteRef": {
                                  "key": f"{namespace}/aws-creds",
                                  "property": "AWS_SECRET_ACCESS_KEY",
                              },
                          },
                      ],
                  },
              }

          def make_deployment(name, namespace, image, port, replicas, env_list, db_secret, aws_secret, health_path, annotations):
              container = {
                  "name": "app",
                  "image": image,
                  "ports": [{"name": "http", "containerPort": port}],
                  "resources": {
                      "requests": {"cpu": "100m", "memory": "128Mi"},
                      "limits":   {"cpu": "500m", "memory": "512Mi"},
                  },
                  "livenessProbe": {
                      "httpGet": {"path": health_path, "port": port},
                      "initialDelaySeconds": 30, "periodSeconds": 30,
                  },
                  "readinessProbe": {
                      "httpGet": {"path": health_path, "port": port},
                      "initialDelaySeconds": 5, "periodSeconds": 10,
                  },
              }
              # Build envFrom dynamically based on what the app needs
              env_from_blocks = []
              if db_secret:
                  env_from_blocks.append({"secretRef": {"name": db_secret}})
              if aws_secret:
                  env_from_blocks.append({"secretRef": {"name": aws_secret}})

              # DATABASE_URL env var via secretKeyRef (preserve v1.2 behavior)
              db_env = []
              if db_secret:
                  db_env.append({
                      "name": "DATABASE_URL",
                      "valueFrom": {"secretKeyRef": {"name": db_secret, "key": "uri"}},
                  })

              # Inject AWS configuration as static env vars
              aws_env = []
              if aws_secret:
                  aws_env.extend([
                      {"name": "AWS_REGION", "value": AWS_REGION},
                      {"name": "BUCKET_NAME", "value": f"{AWS_ACCOUNT_ID}-{name}"},
                  ])

              container_env = list(env_list) + db_env + aws_env
              if container_env:
                  container["env"] = container_env
              if env_from_blocks:
                  container["envFrom"] = env_from_blocks
              return {
                  "apiVersion": "apps/v1",
                  "kind": "Deployment",
                  "metadata": {
                      "name": name,
                      "namespace": namespace,
                      "labels": std_labels(name),
                      "annotations": annotations,
                  },
                  "spec": {
                      "replicas": replicas,
                      "selector": {"matchLabels": {"app.kubernetes.io/name": name}},
                      "template": {
                          "metadata": {"labels": std_labels(name)},
                          "spec": {
                              "imagePullSecrets": [{"name": "ecr-auth"}],
                              "containers": [container],
                          },
                      },
                  },
              }

          def make_service(name, namespace, port, annotations):
              return {
                  "apiVersion": "v1",
                  "kind": "Service",
                  "metadata": {
                      "name": name,
                      "namespace": namespace,
                      "labels": std_labels(name),
                      "annotations": annotations,
                  },
                  "spec": {
                      "type": "ClusterIP",
                      "selector": {"app.kubernetes.io/name": name},
                      "ports": [{"name": "http", "port": 80, "targetPort": port}],
                  },
              }

          def make_ingress(name, namespace, host, annotations):
              base_annotations = {
                  "cert-manager.io/cluster-issuer": "letsencrypt-prod",
                  "nginx.ingress.kubernetes.io/ssl-redirect": "true",
                  "nginx.ingress.kubernetes.io/force-ssl-redirect": "true",
              }
              merged_annotations = {**base_annotations, **annotations}
              return {
                  "apiVersion": "networking.k8s.io/v1",
                  "kind": "Ingress",
                  "metadata": {
                      "name": name,
                      "namespace": namespace,
                      "labels": std_labels(name),
                      "annotations": merged_annotations,
                  },
                  "spec": {
                      "ingressClassName": "nginx",
                      "tls": [{"hosts": [host], "secretName": f"{name}-tls"}],
                      "rules": [{
                          "host": host,
                          "http": {"paths": [{
                              "path": "/", "pathType": "Prefix",
                              "backend": {"service": {"name": name, "port": {"number": 80}}},
                          }]},
                      }],
                  },
              }

          def make_cnpg_cluster(parent_name, namespace, instances, storage, annotations):
              return {
                  "apiVersion": "postgresql.cnpg.io/v1",
                  "kind": "Cluster",
                  "metadata": {
                      "name": f"{parent_name}-db",
                      "namespace": namespace,
                      "labels": std_labels(parent_name),
                      "annotations": annotations,
                  },
                  "spec": {
                      "instances": instances,
                      "imageName": "ghcr.io/cloudnative-pg/postgresql:16",
                      "bootstrap": {"initdb": {"database": "app", "owner": "app"}},
                      "storage": {"size": storage},
                  },
              }

          def compose(req, rsp):
              xr = resource.struct_to_dict(req.observed.composite.resource)
              spec = xr["spec"]
              name = xr["metadata"]["name"]
              namespace = xr["metadata"]["namespace"]
              xr_annotations = xr["metadata"].get("annotations", {})

              # Integers from a protobuf Struct round-trip as Python floats
              # (Struct's number_value is a double). Cast at the boundary so
              # rendered YAML has true ints — Kubernetes rejects containerPort: 8080.0
              # at apply time even though `crossplane render` accepts it.
              port = int(spec["port"])
              replicas = int(spec.get("replicas", 2))

              db_secret = f"{name}-db" if spec.get("dbNeeded") else None
              aws_secret = f"{name}-aws" if spec.get("s3Needed") else None

              resource.update(
                  rsp.desired.resources["deployment"],
                  make_deployment(name, namespace, spec["image"], port,
                                  replicas, spec.get("env", []),
                                  db_secret, aws_secret,
                                  health_path=spec.get("healthCheckPath", "/"),
                                  annotations=std_annotations(xr_annotations, "deployment")),
              )
              resource.update(
                  rsp.desired.resources["service"],
                  make_service(name, namespace, port,
                               annotations=std_annotations(xr_annotations, "service")),
              )
              resource.update(
                  rsp.desired.resources["ingress"],
                  make_ingress(name, namespace, spec["host"],
                               annotations=std_annotations(xr_annotations, "ingress")),
              )

              # SecretStore is shared between db and aws paths — emit once if EITHER is needed
              needs_secret_store = bool(spec.get("dbNeeded") or spec.get("s3Needed"))
              if needs_secret_store:
                  resource.update(
                      rsp.desired.resources["secretstore"],
                      make_secret_store(name, namespace,
                                        annotations=std_annotations(xr_annotations, "secretstore")),
                  )

              if spec.get("dbNeeded"):
                  resource.update(
                      rsp.desired.resources["dbcluster"],
                      make_cnpg_cluster(name, namespace,
                                        instances=1, storage=spec.get("dbStorage", "1Gi"),
                                        annotations=std_annotations(xr_annotations, "dbcluster")),
                  )
                  # NOTE: SecretStore emission moved out — handled by the shared
                  # `needs_secret_store` block above
                  resource.update(
                      rsp.desired.resources["pushsecret"],
                      make_push_secret(name, namespace,
                                       annotations=std_annotations(xr_annotations, "pushsecret")),
                  )
                  resource.update(
                      rsp.desired.resources["externalsecret"],
                      make_external_secret(name, namespace,
                                           annotations=std_annotations(xr_annotations, "externalsecret")),
                  )

              if spec.get("s3Needed"):
                  resource.update(
                      rsp.desired.resources["awspushsecret"],
                      make_aws_push_secret(name, namespace,
                                           annotations=std_annotations(xr_annotations, "awspushsecret")),
                  )
                  resource.update(
                      rsp.desired.resources["awsexternalsecret"],
                      make_aws_external_secret(name, namespace,
                                               annotations=std_annotations(xr_annotations, "awsexternalsecret")),
                  )
                  # NOTE: NO Bucket/User/Policy/UserPolicyAttachment/AccessKey emission here.
                  # Those are scaffolder-emitted raw manifests in
                  # base-apps/<name>/aws-resources.yaml. v1.3.1 architecture (Option B).
