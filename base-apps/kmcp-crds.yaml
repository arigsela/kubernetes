apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kmcp-crds
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # Deploy before kmcp
spec:
  project: default
  source:
    repoURL: https://github.com/arigsela/kubernetes
    targetRevision: deploy-kagent
    path: base-apps/kmcp-crds
    helm:
      releaseName: kmcp-crds
      chart: kmcp-crds
      repo: https://kagent-dev.github.io/kmcp
      version: 1.0.0
  destination:
    server: https://kubernetes.default.svc
    namespace: kmcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # Required for CRDs
