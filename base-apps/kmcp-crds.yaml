apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kmcp-crds
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # Deploy before kmcp
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/kagent-dev/kmcp/helm/kmcp-crds
    chart: kmcp-crds
    targetRevision: v0.2.1
    helm:
      releaseName: kmcp-crds
  destination:
    server: https://kubernetes.default.svc
    namespace: kmcp-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # Required for CRDs
