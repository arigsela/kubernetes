# Anthropic API key for the kagent controller's chart-generated
# `default-model-config` (referenced by base-apps/kagent.yaml as
# providers.anthropic.apiKeySecretRef: kagent-anthropic).
#
# ADOPTED INTO GIT. This ExternalSecret previously existed only in-cluster,
# tracked by an Argo app named `kagent-config` that no longer exists — an orphan
# no Application owned and no repo declared. It was also the last consumer of the
# broad `vault-backend` SecretStore and the monolithic `kagent` Vault key.
#
# Now credential-scoped like every other: its own ESO ServiceAccount
# (eso-kagent-anthropic) -> Vault role kagent-anthropic -> a policy that reads
# only k8s-secrets/data/kagent-anthropic.
#
# The target Secret name (kagent-anthropic) and key (ANTHROPIC_API_KEY) are
# unchanged, so the controller keeps resolving it; deletionPolicy Retain is
# carried over from the live object.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kagent-anthropic-secrets
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kagent-anthropic
    kind: SecretStore
  target:
    name: kagent-anthropic
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: kagent-anthropic
        property: anthropic-api-key
