# ESO identity for the Anthropic API key used by the kagent controller's
# default-model-config (kagent.yaml: providers.anthropic.apiKeySecretRef).
#
# Vault binds the kubernetes-auth role "kagent-anthropic" to THIS ServiceAccount,
# and that role's policy grants read on exactly one path:
# k8s-secrets/data/kagent-anthropic.
#
# Part of the agent-identity contract: templates/agent-identity/README.md
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-kagent-anthropic
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: kagent
    arigsela.com/idp-managed: "true"
