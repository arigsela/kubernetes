apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kagent-mcp-nginx
  namespace: kagent
  annotations:
    # Own TLS cert for the dedicated MCP host — the UI's kagent-tls secret only
    # covers kagent.arigsela.com. cert-manager solves HTTP-01 via this ingress.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # MCP Streamable HTTP uses SSE on the response. Disable buffering and
    # extend read/send timeouts so long-running agent tasks stream cleanly.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Shares the IP whitelist with the UI ingress.
    nginx.ingress.kubernetes.io/whitelist-source-range: "73.7.190.154/32,170.85.56.189/32,170.85.130.202/32,104.28.177.82/32,10.0.0.0/8"
    # Basic-auth gate for external MCP clients (Claude Code CLI). The controller's
    # /mcp (invoke_agent/list_agents) has no auth of its own; this + the IP
    # allowlist bound who can invoke agents. Credential from Vault via the
    # kagent-mcp-basic-auth ExternalSecret. In-cluster consumers use internal
    # service DNS, not this public path, so they are unaffected.
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: kagent-mcp-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "kagent MCP"
spec:
  ingressClassName: nginx
  # Dedicated host — deliberately NOT kagent.arigsela.com.
  #
  # This previously served `path: /mcp` on kagent.arigsela.com, which silently
  # shadowed the kagent UI's own "MCP & tools" page at /mcp. The ingress won the
  # match, so clicking that menu item returned this endpoint's basic-auth
  # challenge instead of the UI page — an unanswerable password prompt. The
  # match was pathType: Prefix, so every /mcp/* UI route was shadowed too.
  #
  # Splitting by host removes the whole class of bug: the UI owns every path on
  # kagent.arigsela.com, and no future UI route can collide with this endpoint.
  #
  # Depends on the kagent-mcp.arigsela.com A record (Route 53 -> 73.7.190.154).
  # DNS for this cluster is created by hand, not in Terraform.
  #
  # MCP clients (e.g. Claude Code) must point at https://kagent-mcp.arigsela.com/mcp
  tls:
    - hosts:
        - kagent-mcp.arigsela.com
      secretName: kagent-mcp-tls
  rules:
    - host: kagent-mcp.arigsela.com
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: kagent-controller
                port:
                  number: 8083
