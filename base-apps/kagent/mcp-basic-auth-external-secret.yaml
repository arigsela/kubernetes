apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kagent-mcp-basic-auth
  namespace: kagent
spec:
  refreshInterval: 1h
  # Credential-scoped per the agent-identity contract: resolves through the
  # dedicated vault-kagent-mcp-basic-auth SecretStore (ESO SA
  # eso-kagent-mcp-basic-auth -> Vault role kagent-mcp-basic-auth, which reads
  # only k8s-secrets/data/kagent-mcp-basic-auth), not the broad vault-backend
  # store and the monolithic `kagent` key.
  secretStoreRef:
    name: vault-kagent-mcp-basic-auth
    kind: SecretStore
  target:
    # nginx ingress basic auth expects a secret with an `auth` key in htpasswd
    # format (user:hashedpassword). Referenced by the kagent-mcp-nginx ingress
    # auth-secret annotation to gate /mcp for Claude Code CLI access.
    name: kagent-mcp-basic-auth
    creationPolicy: Owner
  data:
    - secretKey: auth
      remoteRef:
        key: kagent-mcp-basic-auth
        property: auth
