apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kagent-mcp-basic-auth
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    # nginx ingress basic auth expects a secret with an `auth` key in htpasswd
    # format (user:hashedpassword). Referenced by the kagent-mcp-nginx ingress
    # auth-secret annotation to gate /mcp for Claude Code CLI access.
    name: kagent-mcp-basic-auth
    creationPolicy: Owner
  data:
    - secretKey: auth
      remoteRef:
        key: kagent
        property: mcp-basic-auth
