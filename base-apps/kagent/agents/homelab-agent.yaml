apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: homelab-agent
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: kagent
    app.kubernetes.io/managed-by: kagent
    app.kubernetes.io/name: homelab-agent
    app: kagent
    arigsela.com/idp-managed: "true"
    # Read-only, capability-transitive: own tools are reads; delegates only to
    # k8s-reader (itself read-only). Carried from homelab-knowledge.
    capability.homelab/class: read
  annotations:
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/component-type: kagent-agent
    backstage.io/managed-by-location: url:https://github.com/arigsela/kubernetes/blob/main/base-apps/kagent/agents/homelab-agent.yaml
    backstage.io/owner: group:default/platform-engineering
spec:
  description: LangGraph BYO agent — answers homelab GitOps/architecture and live-cluster questions (parity with homelab-knowledge), with conversation memory.
  type: BYO
  # No a2aConfig: it is Declarative-only in the kagent 0.9.11 CRD. This BYO
  # agent advertises its skills (repo-knowledge, cluster-troubleshooting,
  # deployment-guidance) via the A2A agent card the container serves at
  # /.well-known/agent.json; kagent introspects that card.
  byo:
    deployment:
      image: 852893458518.dkr.ecr.us-east-2.amazonaws.com/homelab-agent:v0.3.0
      serviceAccountName: homelab-agent
      # No `ports` field — the kagent 0.9.11 BYO contract assumes the container
      # serves A2A on :8080 (kagent wires the Service itself).
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      env:
        # --- secrets (from Task 2 ESO) ---
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: homelab-agent-secrets
              key: anthropic-api-key
        - name: BACKSTAGE_MCP_TOKEN
          valueFrom:
            secretKeyRef:
              name: homelab-agent-secrets
              key: backstage-token
        - name: MEMORY_DB_URL
          valueFrom:
            secretKeyRef:
              name: homelab-agent-db
              key: MEMORY_DB_URL
        # --- model + endpoints (literals) ---
        - name: MODEL_NAME
          value: claude-sonnet-4-6
        - name: AGENT_DOCS_MCP_URL
          value: http://agent-docs-mcp.kagent:3000/mcp
        - name: BACKSTAGE_MCP_URL
          value: http://backstage.backstage.svc.cluster.local/api/mcp-actions/v1/catalog
        - name: K8S_READER_A2A_URL
          value: http://k8s-reader.kagent.svc.cluster.local:8080
        - name: OLLAMA_BASE_URL
          value: http://ollama.ollama.svc.cluster.local:11434
        - name: EMBEDDING_MODEL
          value: nomic-embed-text
        - name: MEMORY_NAMESPACE
          value: homelab-agent
        - name: AGENT_URL
          value: http://homelab-agent.kagent.svc.cluster.local:8080
        - name: LOG_LEVEL
          value: INFO
