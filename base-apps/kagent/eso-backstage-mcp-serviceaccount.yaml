# ESO identity for the Backstage catalog MCP bearer token.
#
# Vault binds the kubernetes-auth role "backstage-mcp" to THIS ServiceAccount, and that
# role's policy grants read on exactly one path: k8s-secrets/data/kagent-backstage-mcp.
# A token minted for this SA therefore cannot read any other consumer's secrets
# — which is the point: the shared "kagent" role could read everything.
#
# Part of the agent-identity contract: templates/agent-identity/README.md
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-backstage-mcp
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: kagent
    arigsela.com/idp-managed: "true"
