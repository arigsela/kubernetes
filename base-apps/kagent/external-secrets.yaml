apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kagent-db-credentials
  namespace: kagent
spec:
  refreshInterval: 1h
  # Credential-scoped per the agent-identity contract: resolves through the
  # dedicated vault-kagent-db SecretStore (ESO SA eso-kagent-db -> Vault role
  # kagent-db, which reads only k8s-secrets/data/kagent-db), not the broad
  # vault-backend store and the monolithic `kagent` key.
  secretStoreRef:
    name: vault-kagent-db
    kind: SecretStore
  target:
    name: kagent-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: db-url
      remoteRef:
        key: kagent-db
        property: db-url
    - secretKey: db-user
      remoteRef:
        key: kagent-db
        property: db-user
    - secretKey: db-password
      remoteRef:
        key: kagent-db
        property: db-password
    - secretKey: db-name
      remoteRef:
        key: kagent-db
        property: db-name
