# Path-scoped SecretStore for the Anthropic API key.
# Authenticates as eso-kagent-anthropic against the Vault kubernetes-auth role
# "kagent-anthropic", whose policy reads only k8s-secrets/data/kagent-anthropic.
#
# This is the last credential to be scoped. With it, the broad `vault-backend`
# store (Vault role `kagent`, bound to the namespace's `default` ServiceAccount,
# able to read the monolithic `kagent` key) has no consumers left and is deleted.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-kagent-anthropic
  namespace: kagent
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "k8s-secrets"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "kagent-anthropic"
          serviceAccountRef:
            name: "eso-kagent-anthropic"
