apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agent-docs-github-mcp-token
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: agent-docs-github-mcp-token
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_PERSONAL_ACCESS_TOKEN
      remoteRef:
        key: kagent
        property: agent-docs-github-token
