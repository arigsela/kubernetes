apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-agent-docs-mcp
  namespace: kagent
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "k8s-secrets"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "kagent-agent-docs-mcp"
          serviceAccountRef:
            name: "eso-agent-docs-mcp"
