apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-mcp-token
  namespace: kagent
spec:
  refreshInterval: 1h
  # Credential-scoped per the agent-identity contract: resolves through the
  # dedicated vault-backstage-mcp SecretStore (ESO SA eso-backstage-mcp -> Vault
  # role backstage-mcp, which reads only k8s-secrets/data/kagent-backstage-mcp),
  # not the broad vault-backend store and the monolithic `kagent` key.
  secretStoreRef:
    name: vault-backstage-mcp
    kind: SecretStore
  target:
    name: backstage-mcp-token
    creationPolicy: Owner
    # Build the full header value so the RemoteMCPServer injects it verbatim.
    template:
      engineVersion: v2
      data:
        authorization: "Bearer {{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: kagent-backstage-mcp
        property: token
