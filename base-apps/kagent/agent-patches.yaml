# Human-in-the-loop patches for write-capable agents (Task 3.2)
# These are applied as strategic merge patches to Agent CRDs after Helm deploys them.
# The kagent controller reconciles Agent CRDs, so patching them is safe.
#
# Apply with: kubectl apply -f agent-patches.yaml --server-side --force-conflicts
#
# Write tools that require approval per agent:
#   k8s-agent: create, delete, patch, apply, execute
#   helm-agent: upgrade, uninstall, apply
#   istio-agent: create, delete, patch, install, apply/delete waypoint
#   kgateway-agent: create, delete, patch, apply, helm upgrade/uninstall
#   argo-rollouts-conversion-agent: create, delete, apply
#
# Removed agents (disabled in Helm values):
#   cilium-manager-agent, cilium-debug-agent, cilium-policy-agent, promql-agent

---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-agent
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: kagent
spec:
  type: Declarative
  declarative:
    tools:
    - type: McpServer
      mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: kagent-tool-server
        toolNames:
        # Read operations
        - k8s_check_service_connectivity
        - k8s_get_events
        - k8s_get_available_api_resources
        - k8s_get_cluster_configuration
        - k8s_describe_resource
        - k8s_get_resource_yaml
        - k8s_get_resources
        - k8s_get_pod_logs
        # Write operations (require approval)
        - k8s_patch_resource
        - k8s_create_resource
        - k8s_create_resource_from_url
        - k8s_delete_resource
        - k8s_apply_manifest
        - k8s_execute_command
        - k8s_annotate_resource
        - k8s_label_resource
        - k8s_remove_annotation
        - k8s_remove_label
        requireApproval:
        - k8s_patch_resource
        - k8s_create_resource
        - k8s_create_resource_from_url
        - k8s_delete_resource
        - k8s_apply_manifest
        - k8s_execute_command
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: helm-agent
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: kagent
spec:
  type: Declarative
  declarative:
    tools:
    - type: McpServer
      mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: kagent-tool-server
        toolNames:
        # Read operations
        - helm_list_releases
        - helm_get_release
        - k8s_get_resources
        - k8s_get_available_api_resources
        # Write operations (require approval)
        - helm_upgrade
        - helm_uninstall
        - helm_repo_add
        - helm_repo_update
        - k8s_apply_manifest
        requireApproval:
        - helm_upgrade
        - helm_uninstall
        - k8s_apply_manifest
