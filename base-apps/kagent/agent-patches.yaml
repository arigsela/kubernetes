    - type: McpServer
      mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: kagent-tool-server
        toolNames:
        # Read operations
        - helm_list_releases
        - helm_get_release
        - k8s_get_resources
        - k8s_get_available_api_resources
        # Write operations (require approval)
        - helm_upgrade
        - helm_uninstall
        - helm_repo_add
        - helm_repo_update
        - k8s_apply_manifest
        requireApproval:
        - helm_upgrade
        - helm_uninstall
        - k8s_apply_manifest
