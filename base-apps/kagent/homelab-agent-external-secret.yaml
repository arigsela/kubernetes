apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homelab-agent-secrets
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab-agent
    kind: SecretStore
  target:
    name: homelab-agent-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: homelab-agent
        property: anthropic-api-key
    - secretKey: backstage-token
      remoteRef:
        key: homelab-agent
        property: backstage-token
