apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lg-agents
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/arigsela/kubernetes
    targetRevision: main
    path: base-apps/lg-agents
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: lg-agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
