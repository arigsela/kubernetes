
# AWS resources for nginx-hello-world — provisioned via Crossplane provider-aws-s3
# and provider-aws-iam (cluster-scoped resources, applied by ArgoCD).
#
# WARNING: bucket has forceDestroy:true — contents are permanently deleted on
# teardown. The IAM user + access key are dedicated per-app (not shared).
#
# Cross-resource references via Crossplane label selectors (resolved at apply time
# by the Crossplane controllers; no sync waves needed). Matches the existing
# loki-aws-infrastructure / argo-workflows-aws-infrastructure pattern.

apiVersion: s3.aws.upbound.io/v1beta1
kind: Bucket
metadata:
  name: 852893458518-nginx-hello-world
  labels:
    app.kubernetes.io/name: nginx-hello-world
    app.kubernetes.io/component: bucket
    app.kubernetes.io/managed-by: crossplane
  annotations:
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/system: platform
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/nginx-hello-world
spec:
  forProvider:
    region: us-east-2
    forceDestroy: true
  providerConfigRef:
    name: default
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: User
metadata:
  name: nginx-hello-world-app
  labels:
    app.kubernetes.io/name: nginx-hello-world
    app.kubernetes.io/component: iam-user
    app.kubernetes.io/managed-by: crossplane
  annotations:
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/system: platform
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/nginx-hello-world
spec:
  forProvider:
    tags:
      ManagedBy: crossplane
      App: nginx-hello-world
  providerConfigRef:
    name: default
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: Policy
metadata:
  name: nginx-hello-world-s3-policy
  labels:
    app.kubernetes.io/name: nginx-hello-world
    app.kubernetes.io/component: iam-policy
    app.kubernetes.io/managed-by: crossplane
  annotations:
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/system: platform
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/nginx-hello-world
spec:
  forProvider:
    description: "S3 RW on nginx-hello-world's own bucket"
    policy: |
      {
        "Version": "2012-10-17",
        "Statement": [{
          "Effect": "Allow",
          "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:ListBucket"],
          "Resource": [
            "arn:aws:s3:::852893458518-nginx-hello-world",
            "arn:aws:s3:::852893458518-nginx-hello-world/*"
          ]
        }]
      }
  providerConfigRef:
    name: default
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: UserPolicyAttachment
metadata:
  name: nginx-hello-world-s3-attachment
  labels:
    app.kubernetes.io/name: nginx-hello-world
    app.kubernetes.io/component: iam-policy-attachment
    app.kubernetes.io/managed-by: crossplane
  annotations:
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/system: platform
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/nginx-hello-world
spec:
  forProvider:
    policyArnSelector:
      matchLabels:
        app.kubernetes.io/name: nginx-hello-world
        app.kubernetes.io/component: iam-policy
    userRef:
      name: nginx-hello-world-app
  providerConfigRef:
    name: default
---
apiVersion: iam.aws.upbound.io/v1beta1
kind: AccessKey
metadata:
  name: nginx-hello-world-app-key
  labels:
    app.kubernetes.io/name: nginx-hello-world
    app.kubernetes.io/component: access-key
    app.kubernetes.io/managed-by: crossplane
  annotations:
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/system: platform
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/nginx-hello-world
spec:
  forProvider:
    userSelector:
      matchLabels:
        app.kubernetes.io/name: nginx-hello-world
        app.kubernetes.io/component: iam-user
  # Connection secret keys: attribute.id, attribute.secret, username
  writeConnectionSecretToRef:
    name: nginx-hello-world-aws-key
    namespace: nginx-hello-world
  providerConfigRef:
    name: default
---
apiVersion: s3.aws.upbound.io/v1beta1
kind: BucketLifecycleConfiguration
metadata:
  name: nginx-hello-world-lifecycle
  labels:
    app.kubernetes.io/name: nginx-hello-world
    app.kubernetes.io/component: bucket-lifecycle
    app.kubernetes.io/managed-by: crossplane
  annotations:
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/system: platform
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/nginx-hello-world
spec:
  forProvider:
    region: us-east-2
    bucketSelector:
      matchLabels:
        app.kubernetes.io/name: nginx-hello-world
        app.kubernetes.io/component: bucket
    rule:
      - id: expire-objects
        status: Enabled
        expiration:
          - days: 60
  providerConfigRef:
    name: default
---
apiVersion: s3.aws.upbound.io/v1beta1
kind: BucketPublicAccessBlock
metadata:
  name: nginx-hello-world-pab
  labels:
    app.kubernetes.io/name: nginx-hello-world
    app.kubernetes.io/component: bucket-public-access-block
    app.kubernetes.io/managed-by: crossplane
  annotations:
    terasky.backstage.io/add-to-catalog: "true"
    terasky.backstage.io/owner: group:default/platform-engineering
    terasky.backstage.io/component-type: service
    terasky.backstage.io/lifecycle: experimental
    terasky.backstage.io/system: platform
    backstage.io/source-location: url:https://github.com/arigsela/kubernetes/tree/main/base-apps/nginx-hello-world
spec:
  forProvider:
    region: us-east-2
    bucketSelector:
      matchLabels:
        app.kubernetes.io/name: nginx-hello-world
        app.kubernetes.io/component: bucket
    blockPublicAcls: true
    blockPublicPolicy: true
    ignorePublicAcls: true
    restrictPublicBuckets: true
  providerConfigRef:
    name: default
