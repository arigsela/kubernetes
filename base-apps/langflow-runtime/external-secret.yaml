apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langflow-db-secrets
  namespace: langflow-runtime
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: langflow-db-secrets
    creationPolicy: Owner
    template:
      data:
        database-url: "postgresql://{{ .db_user }}:{{ .db_password }}@{{ .db_host }}:5432/{{ .db_name }}"
  data:
    - secretKey: db_host
      remoteRef:
        key: langflow
        property: db-host
    - secretKey: db_user
      remoteRef:
        key: langflow
        property: db-user
    - secretKey: db_password
      remoteRef:
        key: langflow
        property: db-password
    - secretKey: db_name
      remoteRef:
        key: langflow
        property: db-name
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langflow-api-secrets
  namespace: langflow-runtime
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: langflow-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: langflow
        property: anthropic-api-key
