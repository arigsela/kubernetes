apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langflow-db-secrets
  namespace: langflow-runtime
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: langflow-db-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: langflow
        property: database-url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langflow-api-secrets
  namespace: langflow-runtime
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: langflow-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: langflow
        property: anthropic-api-key
