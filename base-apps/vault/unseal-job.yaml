apiVersion: batch/v1
kind: Job
metadata:
  name: vault-unseal
  namespace: vault
  labels:
    app.kubernetes.io/instance: vault
    app.kubernetes.io/name: vault
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: vault
        app.kubernetes.io/name: vault
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault
      containers:
        - name: vault-unseal
          image: hashicorp/vault:1.18.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /vault/scripts/unseal.sh
          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc.cluster.local:8200
            - name: VAULT_UNSEAL_KEY_1
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: key1
            - name: VAULT_UNSEAL_KEY_2
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: key2
            - name: VAULT_UNSEAL_KEY_3
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: key3
          volumeMounts:
            - mountPath: /vault/scripts
              name: vault-unseal-script
      volumes:
        - name: vault-unseal-script
          configMap:
            name: vault-unseal-script
            defaultMode: 0755
