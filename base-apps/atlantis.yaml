apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlantis
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://runatlantis.github.io/helm-charts
    chart: atlantis
    targetRevision: 6.1.0
    helm:
      releaseName: atlantis
      values: |
        image:
          repository: infracost/infracost-atlantis
          tag: atlantis0.40-infracost0.10

        # Use OpenTofu instead of Terraform. Atlantis verifies Terraform
        # release signatures against HashiCorp's GPG key, which has expired —
        # breaking `terraform` binary downloads with
        # "unable to verify checksums signature: openpgp: key expired".
        # OpenTofu is signed independently, sidestepping the expired key.
        # These chart-native values render ATLANTIS_DEFAULT_TF_DISTRIBUTION /
        # ATLANTIS_DEFAULT_TF_VERSION — the flags Atlantis 0.40 actually uses
        # (the older --tf-distribution env var is deprecated and ignored).
        # The value must be "opentofu" (not "tofu").
        # providers.tf requires >= 1.11.0; OpenTofu 1.12.3 satisfies it.
        defaultTFDistribution: opentofu
        defaultTFVersion: "1.12.3"

        orgAllowlist: github.com/arigsela/*

        github:
          user: arigsela

        # GitHub token + webhook secret injected from atlantis-vcs K8s secret
        vcsSecretName: atlantis-vcs

        # AWS creds + Infracost API key injected as env vars from atlantis-env K8s secret
        environmentSecrets:
          - name: AWS_ACCESS_KEY_ID
            secretKeyRef:
              name: atlantis-env
              key: AWS_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            secretKeyRef:
              name: atlantis-env
              key: AWS_SECRET_ACCESS_KEY
          - name: INFRACOST_API_KEY
            secretKeyRef:
              name: atlantis-env
              key: INFRACOST_API_KEY
          - name: TF_VAR_host
            secretKeyRef:
              name: atlantis-env
              key: TF_VAR_host
          - name: TF_VAR_client_certificate
            secretKeyRef:
              name: atlantis-env
              key: TF_VAR_client_certificate
          - name: TF_VAR_client_key
            secretKeyRef:
              name: atlantis-env
              key: TF_VAR_client_key
          - name: TF_VAR_cluster_ca_certificate
            secretKeyRef:
              name: atlantis-env
              key: TF_VAR_cluster_ca_certificate

        atlantisUrl: https://atlantis.arigsela.com

        # Server-side repo config — allows custom workflows and sets apply requirements
        repoConfig: |
          repos:
          - id: github.com/arigsela/kubernetes
            allow_custom_workflows: true
            allowed_overrides:
              - workflow
              - apply_requirements
            apply_requirements:
              - approved
              - mergeable

        service:
          type: ClusterIP
          port: 4141

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi

        nodeSelector:
          node.kubernetes.io/workload: infrastructure

        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule

        # Persist Atlantis working directory across restarts
        volumeClaim:
          enabled: true
          dataStorage: 5Gi
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce

        readinessProbe:
          periodSeconds: 10
          initialDelaySeconds: 10

  destination:
    server: https://kubernetes.default.svc
    namespace: atlantis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
