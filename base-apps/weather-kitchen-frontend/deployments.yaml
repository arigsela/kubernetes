apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-kitchen-frontend
  namespace: weather-kitchen-frontend
  labels:
    app: weather-kitchen-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-kitchen-frontend
  template:
    metadata:
      labels:
        app: weather-kitchen-frontend
        component: frontend
    spec:
      nodeSelector:
        node.kubernetes.io/workload: application
      containers:
      - name: frontend
        image: 852893458518.dkr.ecr.us-east-2.amazonaws.com/weather-kitchen-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: API_URL
          value: "https://weather-kitchen.arigsela.com"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
      volumes:
      - name: tmp
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      securityContext:
        fsGroup: 1001
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
