apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: artifact-example
  namespace: argo-workflows
spec:
  entrypoint: main
  serviceAccountName: argo-workflow
  templates:
    - name: main
      steps:
        - - name: generate
            template: generate-file
        - - name: process
            template: process-file
            arguments:
              artifacts:
                - name: in
                  from: "{{steps.generate.outputs.artifacts.out}}"
        - - name: report
            template: report-results
            arguments:
              artifacts:
                - name: in
                  from: "{{steps.process.outputs.artifacts.out}}"

    - name: generate-file
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          mkdir -p /out
          seq 1 100 > /out/data.txt
          echo "generated /out/data.txt with $(wc -l </out/data.txt) lines"
      outputs:
        artifacts:
          - name: out
            path: /out

    - name: process-file
      inputs:
        artifacts:
          - name: in
            path: /in
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          mkdir -p /out
          # Sum the numbers
          awk '{s+=$1} END {print "sum="s}' /in/data.txt > /out/summary.txt
          wc -l /in/data.txt >> /out/summary.txt
          cat /out/summary.txt
      outputs:
        artifacts:
          - name: out
            path: /out

    - name: report-results
      inputs:
        artifacts:
          - name: in
            path: /in
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          echo "=== Report ==="
          cat /in/summary.txt
