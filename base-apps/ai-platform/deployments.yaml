# Source: ai-platform-engineering/charts/supervisor-agent/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-platform-supervisor-agent
  labels:
    helm.sh/chart: supervisor-agent-0.2.2
    app.kubernetes.io/name: supervisor-agent
    app.kubernetes.io/instance: ai-platform
    app.kubernetes.io/version: "0.2.2"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: supervisor-agent
      app.kubernetes.io/instance: ai-platform
  template:
    metadata:
      labels:
        helm.sh/chart: supervisor-agent-0.2.2
        app.kubernetes.io/name: supervisor-agent
        app.kubernetes.io/instance: ai-platform
        app.kubernetes.io/version: "0.2.2"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: ai-platform-supervisor-agent
      containers:
        - name: supervisor-agent
          image: "ghcr.io/cnoe-io/ai-platform-engineering:stable"
          imagePullPolicy: Always
          args:
            - "platform-engineer"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: llm-secret
            - configMapRef:
                name: ai-platform-supervisor-agent-env
          env:
            - name: AGENT_PROTOCOL
              value: "a2a"
            - name: AGENT_CONNECTIVITY_ENABLE_BACKGROUND
              value: "true"
            - name: EXTERNAL_URL
              value: "http://localhost:8000"
            - name: SKIP_AGENT_CONNECTIVITY_CHECK
              value: "false"
          livenessProbe:
            failureThreshold: 5
            tcpSocket:
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            failureThreshold: 5
            httpGet:
              path: /.well-known/agent-card.json
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: prompt-config
              mountPath: /app/prompt_config.yaml
              subPath: prompt_config.yaml
              readOnly: true
      volumes:
        - name: prompt-config
          configMap:
            name: prompt-config
