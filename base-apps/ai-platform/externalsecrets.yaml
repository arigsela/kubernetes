apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-agent-secret
  namespace: ai-platform
spec:
  refreshInterval: 15s
  secretStoreRef:
    kind: SecretStore
    name: vault-backend
  target:
    name: argocd-agent-secret
    creationPolicy: Owner
  data:
    - secretKey: ARGOCD_USERNAME
      remoteRef:
        key: ai-platform/argocd-agent
        property: ARGOCD_USERNAME
    - secretKey: ARGOCD_PASSWORD
      remoteRef:
        key: ai-platform/argocd-agent
        property: ARGOCD_PASSWORD
    - secretKey: ARGOCD_API_URL
      remoteRef:
        key: ai-platform/argocd-agent
        property: ARGOCD_API_URL
    - secretKey: ARGOCD_INSECURE
      remoteRef:
        key: ai-platform/argocd-agent
        property: ARGOCD_INSECURE
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-agent-secret
  namespace: ai-platform
spec:
  refreshInterval: 15s
  secretStoreRef:
    kind: SecretStore
    name: vault-backend
  target:
    name: github-agent-secret
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_PERSONAL_ACCESS_TOKEN
      remoteRef:
        key: ai-platform/github-agent
        property: GITHUB_PERSONAL_ACCESS_TOKEN
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-secret
  namespace: ai-platform
spec:
  refreshInterval: 15s
  secretStoreRef:
    kind: SecretStore
    name: vault-backend
  target:
    name: llm-secret
    creationPolicy: Owner
  data:
    - secretKey: LLM_PROVIDER
      remoteRef:
        key: ai-platform/llm
        property: LLM_PROVIDER
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ai-platform/llm
        property: ANTHROPIC_API_KEY
    - secretKey: ANTHROPIC_MODEL_NAME
      remoteRef:
        key: ai-platform/llm
        property: ANTHROPIC_MODEL_NAME
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: ai-platform
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "k8s-secrets"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "ai-platform"
          serviceAccountRef:
            name: "default"
---
