---
# Source: ai-platform-engineering/charts/agent-argocd/templates/mcp-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-platform-agent-argocd-mcp
  labels:
    helm.sh/chart: agent-argocd-0.3.2
    app.kubernetes.io/name: agent-argocd
    app.kubernetes.io/instance: ai-platform
    app.kubernetes.io/version: "0.3.2"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: ai-platform-agent-argocd-mcp
    app.kubernetes.io/component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-argocd
      app.kubernetes.io/instance: ai-platform
      app.kubernetes.io/name: ai-platform-agent-argocd-mcp
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        helm.sh/chart: agent-argocd-0.3.2
        app.kubernetes.io/name: agent-argocd
        app.kubernetes.io/instance: ai-platform
        app.kubernetes.io/version: "0.3.2"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: ai-platform-agent-argocd-mcp
        app.kubernetes.io/component: mcp
    spec:
      serviceAccountName: ai-platform-agent-argocd
      containers:
        - name: mcp
          image: "ghcr.io/cnoe-io/mcp-argocd:stable"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: llm-secret
            - secretRef:
                name: argocd-agent-secret
          env:
            - name: MCP_MODE
              value: http
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8000"
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
