apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langflow-db-secrets
  namespace: langflow-ide
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: langflow-db-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-host
      remoteRef:
        key: langflow
        property: db-host
    - secretKey: db-name
      remoteRef:
        key: langflow
        property: db-name
    - secretKey: db-user
      remoteRef:
        key: langflow
        property: db-user
    - secretKey: db-password
      remoteRef:
        key: langflow
        property: db-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langflow-api-secrets
  namespace: langflow-ide
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: langflow-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: langflow
        property: anthropic-api-key
