apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kagent-db-credentials
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: kagent-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: kagent-user
      remoteRef:
        key: kagent
        property: db-user
    - secretKey: kagent-password
      remoteRef:
        key: kagent
        property: db-password
    - secretKey: kagent-database
      remoteRef:
        key: kagent
        property: db-name
