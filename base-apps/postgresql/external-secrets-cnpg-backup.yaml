# AWS credentials for postgresql-cluster's barman S3 backups.
#
# Adopted into GitOps on 2026-07-15 alongside cnpg-cluster.yaml — previously
# owned by the deleted "postgresql-cnpg" Argo CD Application. Spec matches
# the live object exactly.
#
# KNOWN ISSUE (do not silently "fix" by deleting the target Secret): this
# ExternalSecret reads the legacy Vault key `mysql`, which stopped resolving
# on 2026-04-11 (status: SecretSyncedError, "could not get secret data from
# provider"). Backups still succeed because the previously-synced
# postgresql-backup-credentials Secret was retained and its AWS keys remain
# valid. If that Secret is ever deleted or the keys rotated, backups break.
# Follow-up: move the credentials to a `postgresql-backup` Vault key and
# repoint remoteRef.key here.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-backup-credentials
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: postgresql-backup-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: mysql
        property: AWS_ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: mysql
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_REGION
      remoteRef:
        key: mysql
        property: AWS_REGION
