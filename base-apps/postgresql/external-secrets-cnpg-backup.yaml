# AWS credentials for postgresql-cluster's barman S3 backups.
#
# Adopted into GitOps on 2026-07-15 (previously owned by the deleted
# "postgresql-cnpg" Argo CD Application). Originally this read the legacy
# Vault key `mysql`, which the `postgresql` Vault role was never allowed to
# read — sync had been failing since 2026-04-11 and backups only worked
# because the previously-synced Secret was retained with still-valid keys.
# Fixed same day: the credentials now live in the dedicated Vault key
# `postgresql-backup` (same IAM user, copied verbatim), and the `postgresql`
# Vault policy grants read on that path.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-backup-credentials
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: postgresql-backup-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: postgresql-backup
        property: aws-access-key-id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: postgresql-backup
        property: aws-secret-access-key
    - secretKey: AWS_REGION
      remoteRef:
        key: postgresql-backup
        property: aws-region
