apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homelab-agent-db-credentials
  namespace: postgresql
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab-agent-db
    kind: SecretStore
  target:
    name: homelab-agent-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: homelab-agent-db
        property: password
