apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: chores-tracker-backend
  namespace: chores-tracker
  annotations:
    agent-docs/path: docs.md
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-label-selector: 'app=chores-tracker-backend'
    backstage.io/kubernetes-namespace: chores-tracker
  tags: [fastapi, postgresql, jwt]
spec:
  type: service
  lifecycle: production
  owner: group:default/platform
  system: default/chores-tracker
  providesApis:
    - default/chores-tracker-backend-api
  dependsOn:
    - resource:vault/vault
