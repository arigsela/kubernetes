apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
      annotations:
        # Roll the pod when the workflow JSON changes so the import initContainer
        # re-imports it and n8n re-registers its webhook at startup. Value is the
        # sha256 (first 16 hex chars) of workflows-configmap.yaml's
        # grafana-alerts.json. If you edit the workflow, recompute this — else the
        # pod won't roll and the change won't take effect. (Or just
        # `kubectl rollout restart deploy/n8n -n n8n`.)
        checksum/workflows: "2c16107926191499"
    spec:
      nodeSelector:
        node.kubernetes.io/workload: application
      # Set ownership for the mounted volume
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
      # Import + activate the GitOps-managed workflows into n8n's database BEFORE
      # the main container starts. n8n registers webhook routes for active
      # workflows only at STARTUP, so tying the import to the pod lifecycle here
      # guarantees the main container boots with the workflow active and its
      # webhook registered. (This replaced a per-sync PreSync Job that re-ran on
      # unrelated app syncs and left the webhook active-in-DB but unregistered
      # whenever the pod didn't happen to restart — a real 404 we hit in prod.)
      - name: import-workflows
        image: n8nio/n8n:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          n8n import:workflow --input=/workflows/grafana-alerts.json
          n8n update:workflow --id=grafana-alerts-slack --active=true
        env:
        - name: DB_TYPE
          value: "postgresdb"
        - name: DB_POSTGRESDB_HOST
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-host
        - name: DB_POSTGRESDB_PORT
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-port
        - name: DB_POSTGRESDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-name
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-user
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-password
        - name: N8N_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: encryption-key
        # Keep the CLI's scratch settings dir off the shared PVC.
        - name: N8N_USER_FOLDER
          value: /tmp/n8n
        volumeMounts:
        - name: workflows
          mountPath: /workflows
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      containers:
      - name: n8n
        image: n8nio/n8n:latest
        env:
        # Database Configuration
        - name: DB_TYPE
          value: "postgresdb"
        - name: DB_POSTGRESDB_HOST
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-host
        - name: DB_POSTGRESDB_PORT
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-port
        - name: DB_POSTGRESDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-name
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-user
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: db-password
        # n8n Core Configuration
        - name: N8N_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: encryption-key

        # Slack bot token for GitOps-managed workflows (workflows-configmap.yaml).
        # Read inside workflow expressions as {{ $env.SLACK_BOT_TOKEN }} so no
        # n8n credential object (encrypted, DB-resident, un-importable) is needed.
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: slack-bot-token

        # n8n blocks $env access in expressions by default; without this the
        # grafana-alerts workflow dies with "ExpressionError: access to env
        # vars denied" (observed on first live execution). Trade-off: any
        # workflow author can read this pod's env (DB creds, encryption key) —
        # acceptable here because the editor UI is IP-allowlisted + basic-auth
        # and this is a single-operator instance.
        - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
          value: "false"

        # UPDATED: Webhook URL (changed to HTTPS)
        - name: WEBHOOK_URL
          value: "https://n8n.arigsela.com/"

        # UPDATED: Protocol changed from http to https
        - name: N8N_PROTOCOL
          value: "https"

        # NEW: Hostname configuration
        - name: N8N_HOST
          value: "n8n.arigsela.com"

        - name: N8N_PORT
          value: "5678"
        - name: N8N_LOG_LEVEL
          value: "info"

        # Trust proxy for X-Forwarded-For headers (required behind nginx ingress)
        - name: N8N_PROXY_HOPS
          value: "1"

        # Enforce correct file permissions for settings
        - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
          value: "true"

        # Execution Settings
        - name: EXECUTIONS_DATA_SAVE_ON_ERROR
          value: "all"
        - name: EXECUTIONS_DATA_SAVE_ON_SUCCESS
          value: "all"
        - name: EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS
          value: "true"

        # 🔒 NEW: BASIC AUTHENTICATION CONFIGURATION
        - name: N8N_BASIC_AUTH_ACTIVE
          value: "true"
        - name: N8N_BASIC_AUTH_USER
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: basic-auth-user
        - name: N8N_BASIC_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: basic-auth-password
        ports:
        - containerPort: 5678
          name: http
        resources:
          requests:
            memory: "500Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5678
          initialDelaySeconds: 240
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5678
          initialDelaySeconds: 240
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: n8n-storage
          mountPath: /home/node/.n8n
      volumes:
      - name: n8n-storage
        persistentVolumeClaim:
          claimName: n8n-pvc
      - name: workflows
        configMap:
          name: n8n-workflows
