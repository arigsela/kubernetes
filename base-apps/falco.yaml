apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  name: falco
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 8.0.2
    helm:
      releaseName: falco
      values: |
        # Runtime security DaemonSet - must run on every node for full coverage.
        # No nodeSelector: pinning to infrastructure would create blind spots on
        # application/worker nodes where most workloads actually run.
        driver:
          kind: auto
        tolerations:
          - effect: NoSchedule
            key: node-role.kubernetes.io/control-plane
          - effect: NoSchedule
            key: node-role.kubernetes.io/master
        falco:
          # WAS `warning`, which silently threw away 2 of the 3 rules enabled
          # below. Falco's `priority` is an OUTPUT THRESHOLD — anything below it is
          # discarded before it reaches stdout — and the rules do not all sit at
          # the same level:
          #
          #   Terminal shell in container             NOTICE   <- discarded
          #   Contact K8S API Server From Container   NOTICE   <- discarded
          #   Read sensitive file untrusted           WARNING
          #
          # So Falco ran on three nodes for months and produced ZERO detections
          # while reporting perfectly healthy. Confirmed empirically: ~12
          # `kubectl exec` calls into vault-0 and the Postgres pods in one
          # afternoon produced zero "Terminal shell in container" events, and there
          # were zero detections of any kind in 7 days.
          #
          # Same failure mode as the requireApproval gate Argo was stripping, and
          # the Kyverno delegation rule that failed open on missing RBAC: a control
          # that reports healthy while doing nothing. Falco did not need a sink —
          # it needed to actually fire.
          #
          # `notice` is deliberate, not maximal: `informational`/`debug` would bury
          # the signal. "Terminal shell in container" WILL be chatty (every kubectl
          # exec, some liveness probes) — which is why the Grafana alert rule filters
          # on specific rule names rather than alerting on any Falco line at all.
          priority: notice
          json_output: true
          json_include_output_property: true
          log_level: info
          log_stderr: true
          log_syslog: false
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
        collectors:
          kubernetes:
            enabled: false
        falcosidekick:
          enabled: false
        customRules:
          # Enable high-signal rules that ship disabled-by-default in Falco 0.40+.
          # Scoped for smoke-testing the detection pipeline end-to-end; expect to
          # prune this list before wiring falcosidekick/Slack to avoid alert noise
          # (Terminal shell in container is especially chatty — kubectl exec,
          # liveness probes that shell out, etc.).
          # Falco 0.40+ requires the explicit override schema — bare `enabled: true`
          # is deprecated and fails to load. "Write below etc" was removed from the
          # current stable rules pack, so it's dropped here.
          override-smoke-test.yaml: |-
            - rule: Terminal shell in container
              override:
                enabled: replace
              enabled: true
            - rule: Read sensitive file untrusted
              override:
                enabled: replace
              enabled: true
            - rule: Contact K8S API Server From Container
              override:
                enabled: replace
              enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
