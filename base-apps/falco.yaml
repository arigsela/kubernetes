apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 8.0.2
    helm:
      releaseName: falco
      values: |
        # Runtime security DaemonSet - must run on every node for full coverage.
        # No nodeSelector: pinning to infrastructure would create blind spots on
        # application/worker nodes where most workloads actually run.
        driver:
          kind: auto
        tolerations:
          - effect: NoSchedule
            key: node-role.kubernetes.io/control-plane
          - effect: NoSchedule
            key: node-role.kubernetes.io/master
        falco:
          priority: warning
          json_output: true
          json_include_output_property: true
          log_level: info
          log_stderr: true
          log_syslog: false
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
        collectors:
          kubernetes:
            enabled: false
        falcosidekick:
          enabled: false
        customRules:
          # Enable high-signal rules that ship disabled-by-default in Falco 0.40+.
          # Scoped for smoke-testing the detection pipeline end-to-end; expect to
          # prune this list before wiring falcosidekick/Slack to avoid alert noise
          # (Terminal shell in container is especially chatty — kubectl exec,
          # liveness probes that shell out, etc.).
          # Falco 0.40+ requires the explicit override schema — bare `enabled: true`
          # is deprecated and fails to load. "Write below etc" was removed from the
          # current stable rules pack, so it's dropped here.
          override-smoke-test.yaml: |-
            - rule: Terminal shell in container
              override:
                enabled: replace
              enabled: true
            - rule: Read sensitive file untrusted
              override:
                enabled: replace
              enabled: true
            - rule: Contact K8S API Server From Container
              override:
                enabled: replace
              enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
