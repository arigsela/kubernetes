---
# atlantis-vcs: GitHub token + webhook secret
# Referenced by Helm chart via vcsSecretName: atlantis-vcs
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atlantis-vcs
  namespace: atlantis
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: atlantis-vcs
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: atlantis/github
        property: token
    - secretKey: webhook
      remoteRef:
        key: atlantis/webhook
        property: secret
---
# atlantis-env: AWS creds + Infracost API key as env var names
# Referenced by Helm chart via environmentSecrets: [{name: atlantis-env}]
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: atlantis-env
  namespace: atlantis
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: atlantis-env
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: atlantis/aws
        property: access-key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: atlantis/aws
        property: secret-key
    - secretKey: INFRACOST_API_KEY
      remoteRef:
        key: atlantis/infracost
        property: api-key
