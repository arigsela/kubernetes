apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orchestrator-secrets
  namespace: lg-agents
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: orchestrator-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: lg-agents
        property: anthropic-api-key
    - secretKey: api-keys
      remoteRef:
        key: lg-agents
        property: api-keys
    - secretKey: jwt-secret
      remoteRef:
        key: lg-agents
        property: jwt-secret
