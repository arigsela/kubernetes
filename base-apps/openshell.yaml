apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshell
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    chart: helm-chart
    repoURL: ghcr.io/nvidia/openshell
    targetRevision: 0.0.49
    helm:
      valuesObject:
        # PKI via cert-manager — chart auto-creates a namespaced Issuer and
        # Certificates. Disable the bootstrap Job so we don't double-write the
        # server/client TLS Secrets. (PR #305 context.)
        certManager:
          enabled: true
        pkiInitJob:
          enabled: false

        # server.disableTls=true: plain-h2c gRPC on :8080.
        #
        # Background: PR #307 attempted "server-TLS-only" (drop the gateway's
        # client_ca requirement, keep encryption). That worked at the volume
        # mount level but the chart's templates/gateway-config.yaml renders
        # `client_ca_path` UNCONDITIONALLY inside the `[openshell.gateway.tls]`
        # block — there is no `{{- if }}` gate on it in v0.0.49. With the
        # volume mount removed by clientCaFromServerTlsSecret=false, the
        # gateway would try to read a path that doesn't exist. There is no
        # clean "encrypted but no client-cert demand" mode for this chart.
        #
        # And on the controller side, kagent v0.9.4's openshell client has
        # no client-cert config fields (verified in
        # go/core/pkg/sandboxbackend/openshell/{client,config}.go at v0.9.4).
        # It can dial insecure (no TLS) or TLS-with-CA (server verify only) —
        # never present a client cert.
        #
        # Net: disable TLS entirely. Gateway speaks plain h2c; the controller
        # dials with OPENSHELL_INSECURE=true. Traffic stays on the CNI overlay
        # behind NetworkPolicy. Re-enable encryption once either upstream
        # fixes lands. See issues #306, kagent docs, and the design spec at
        # docs/superpowers/specs/2026-05-28-openshell-controller-mtls-design.md.
        server:
          disableTls: true
          # allowUnauthenticatedUsers=true: gateway accepts requests without
          # an Authorization: Bearer <token> header, treating the caller as a
          # local-developer principal.
          #
          # Why: PR #308 disabled TLS to work around the chart's inability to
          # express server-TLS-only. Even after that landed, the kagent v0.9.4
          # controller's connections were rejected at the gRPC application
          # layer with "Unauthenticated: missing authorization header" — the
          # gateway requires bearer tokens by default unless OIDC is enabled
          # (it isn't) or auth is explicitly opened. The kagent controller
          # config has a Token/TokenFile field but no token source is wired
          # in our deployment; standing up an OIDC issuer is out of scope for
          # this homelab.
          #
          # Trade-off: anything that can reach the gateway gRPC port becomes
          # an authenticated principal. NetworkPolicies + intra-cluster RBAC
          # are the perimeter. Consistent with the disableTls=true posture.
          # Revisit when an OIDC issuer is available OR when kagent supports
          # mTLS client certs (then we can flip back to identity-bearing auth).
          auth:
            allowUnauthenticatedUsers: true
          # enableUserNamespaces=true: gateway emits
          # `enable_user_namespaces = true` in gateway.toml; the kubernetes
          # driver then creates sandbox pods with hostUsers=false. The agent
          # container inside the sandbox runs in its own user namespace, so
          # CAP_SYS_ADMIN/CAP_NET_ADMIN are namespaced and the agent can
          # create network namespaces without host-level privileges.
          #
          # Why: post-PR #309 verification surfaced that sandbox pods crash
          # at startup with `mount --make-shared /run/netns: Permission
          # denied` even with SYS_ADMIN granted, because containerd's
          # seccomp/AppArmor profile blocks the underlying syscall at the
          # host level. User namespaces give the agent its own namespace
          # where the capabilities are real. See issue #310.
          #
          # Prereqs in this cluster: kernel 6.8 (chart requires 5.12+),
          # k8s 1.33 (hostUsers field went GA in 1.30).
          enableUserNamespaces: true

        # Gateway pod resource bounds. Kyverno require-resource-limits policy
        # only warns when missing, but declaring explicitly keeps events clean.
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Restricts sandbox-pod SSH ingress to the gateway only.
        networkPolicy:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: openshell
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
