# ExternalSecrets for OnCall CrewAI agents (k3s homelab)
# Syncs secrets from Vault to Kubernetes
# Vault path: k8s-secrets/oncall-crewai

# K8s Agent secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: k8s-agent-secrets
  namespace: oncall-crewai
  labels:
    app: k8s-agent-a2a
    component: external-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: k8s-agent-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: oncall-crewai
        property: anthropic-api-key

---
# GitHub Agent secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-agent-secrets
  namespace: oncall-crewai
  labels:
    app: github-agent-a2a
    component: external-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: github-agent-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: oncall-crewai
        property: anthropic-api-key

    - secretKey: github-token
      remoteRef:
        key: oncall-crewai
        property: github-token

---
# Orchestrator secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orchestrator-secrets
  namespace: oncall-crewai
  labels:
    app: crewai-orchestrator
    component: external-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: orchestrator-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: oncall-crewai
        property: anthropic-api-key

    - secretKey: api-keys
      remoteRef:
        key: oncall-crewai
        property: api-keys
