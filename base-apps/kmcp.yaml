apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kmcp
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "0"  # After CRDs
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/kagent-dev/kmcp/helm/kmcp
    chart: kmcp
    targetRevision: 0.2.1
    helm:
      releaseName: kmcp
      values: |
        # Image configuration - use chart's default appVersion
        image:
          pullPolicy: IfNotPresent

        # Controller configuration
        controller:
          replicaCount: 1
          leaderElection:
            enabled: true
          healthProbe:
            bindAddress: ":8081"
            livenessProbe:
              initialDelaySeconds: 15
              periodSeconds: 20
            readinessProbe:
              initialDelaySeconds: 5
              periodSeconds: 10
          metrics:
            enabled: true
            bindAddress: ":8443"
            secureServing: true

        # Resource limits
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi

        # Node scheduling (optional - match your infra nodes)
        nodeSelector:
          node.kubernetes.io/workload: infrastructure
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule

        # Service account
        serviceAccount:
          create: true

        # RBAC
        rbac:
          create: true

        # Pod annotations
        podAnnotations: {}

        # Pod security context
        podSecurityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault

        # Container security context
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"

        # Service configuration for metrics
        service:
          type: ClusterIP
          port: 8443
          targetPort: 8443
  destination:
    server: https://kubernetes.default.svc
    namespace: kmcp-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
