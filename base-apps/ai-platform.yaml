apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-platform
  namespace: argo-cd
  labels:
    app.kubernetes.io/name: ai-platform
spec:
  project: default

  sources:
    # CAIPE Helm Chart from remote repository
    - repoURL: https://cnoe-io.github.io/ai-platform-engineering
      chart: ai-platform-engineering
      targetRevision: 0.4.11
      helm:
        valueFiles:
          - $values/base-apps/ai-platform/values.yaml

    # Values file from our Git repository
    - repoURL: https://github.com/arigsela/kubernetes
      targetRevision: feature/caipe-deployment
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: ai-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
