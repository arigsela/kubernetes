apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-secrets
  namespace: backstage
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: backstage-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: backstage
        property: postgres-user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: backstage
        property: postgres-password
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: backstage
        property: github-token
    - secretKey: AUTH_GITHUB_CLIENT_ID
      remoteRef:
        key: backstage
        property: github-oauth-client-id
    - secretKey: AUTH_GITHUB_CLIENT_SECRET
      remoteRef:
        key: backstage
        property: github-oauth-client-secret
    - secretKey: K8S_CLUSTER_URL
      remoteRef:
        key: backstage
        property: k8s-cluster-url
    - secretKey: K8S_SERVICE_ACCOUNT_TOKEN
      remoteRef:
        key: backstage
        property: k8s-service-account-token
    # --- AWS (Scaffolder ECR Actions) ---
    # Used by aws:ecr:create and aws:ecr:build-push scaffolder actions
    # to create ECR repos and push Docker images during template execution.
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: backstage
        property: aws-access-key-id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: backstage
        property: aws-secret-access-key
    # --- Vault (Scaffolder vault:setup Action) ---
    # Used by the vault:setup scaffolder action to provision Vault resources
    # (policy, K8s auth role, placeholder secrets) when scaffolding new projects.
    - secretKey: VAULT_TOKEN
      remoteRef:
        key: backstage
        property: vault-token
