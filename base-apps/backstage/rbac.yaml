apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: backstage

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-read-only
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - namespaces
      - limitranges
      - resourcequotas
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-read-only
subjects:
  - kind: ServiceAccount
    name: backstage
    namespace: backstage
roleRef:
  kind: ClusterRole
  name: backstage-read-only
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-crossplane-read
rules:
  # Kubernetes built-in CRD API — kubernetes-ingestor walks all CRDs at startup
  # to discover what kinds to ingest (and to render entity types from XRDs).
  # Without this, the ingestor logs Forbidden 403s in a loop and never ingests
  # any annotated XRs.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

  # Crossplane core APIs — XRDs, Compositions, Functions, Operations
  - apiGroups: ["apiextensions.crossplane.io"]
    resources: ["compositeresourcedefinitions", "compositions", "compositionrevisions", "functions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["pkg.crossplane.io"]
    resources: ["providers", "providerrevisions", "configurations", "configurationrevisions", "functions", "functionrevisions"]
    verbs: ["get", "list", "watch"]

  # Our own platform XR API + any future namespaced/cluster XRs we add
  - apiGroups: ["platform.arigsela.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # Managed resource APIs — what XRs compose into. The kubernetes-ingestor
  # walks the compositionRevision's resources to find these.
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "poolers", "backups", "scheduledbackups"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["s3.aws.upbound.io", "iam.aws.upbound.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # External Secrets Operator (ESO) — v1.2 + v1.3.1 IDP apps emit SecretStore /
  # PushSecret / ExternalSecret as part of their Vault round-trip flow.
  # Without this, the Backstage Crossplane tab can't list these resources
  # even though they're in the XR's resourceRefs.
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores", "pushsecrets", "externalsecrets"]
    verbs: ["get", "list", "watch"]

  # Crossplane internal status resources used by the resources plugin's graph
  - apiGroups: ["protection.crossplane.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-crossplane-read
subjects:
  - kind: ServiceAccount
    name: backstage
    namespace: backstage
roleRef:
  kind: ClusterRole
  name: backstage-crossplane-read
  apiGroup: rbac.authorization.k8s.io
