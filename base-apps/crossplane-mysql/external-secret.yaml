apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mysql-credentials
  namespace: crossplane-system
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: mysql-credentials
    creationPolicy: Owner
  data:
    - secretKey: port
      remoteRef:
        key: mysql-credentials
        property: port
    - secretKey: endpoint
      remoteRef:
        key: mysql-credentials
        property: endpoint
    - secretKey: password
      remoteRef:
        key: mysql-credentials
        property: DB_PASSWORD
    - secretKey: username
      remoteRef:
        key: mysql-credentials
        property: DB_USER
