apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dnd-agent
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/arigsela/kubernetes
    targetRevision: main
    path: base-apps/dnd-agent
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: dnd-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
