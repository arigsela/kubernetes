apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smoke-app
  labels:
    app.kubernetes.io/name: smoke-app
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smoke-app
                port:
                  number: 80
