name: Validate Manifests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      yaml_files: ${{ steps.changed.outputs.yaml_files }}
      yaml_any_changed: ${{ steps.changed.outputs.yaml_any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get changed YAML files
        id: changed
        run: |
          # --diff-filter=d excludes deleted files so downstream lint/validate
          # steps don't try to read paths that no longer exist on disk.
          #
          # Both pathspecs are required: 'base-apps/**/*.yaml' has a literal '/'
          # after the '**', so it only matches files at least one directory deep
          # and silently misses the top-level Argo CD Application manifests
          # (base-apps/<app>.yaml). Without 'base-apps/*.yaml' those files are
          # never linted or schema-validated, and the jobs below skip while
          # reporting green.
          PATHSPEC=('base-apps/*.yaml' 'base-apps/**/*.yaml')
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only --diff-filter=d HEAD~1 HEAD -- "${PATHSPEC[@]}" | tr '\n' ' ')
          else
            FILES=$(git diff --name-only --diff-filter=d origin/main...HEAD -- "${PATHSPEC[@]}" | tr '\n' ' ')
          fi
          echo "yaml_files=$FILES" >> "$GITHUB_OUTPUT"
          if [ -n "$FILES" ]; then
            echo "yaml_any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "yaml_any_changed=false" >> "$GITHUB_OUTPUT"
          fi

  yaml-lint:
    needs: changed-files
    if: needs.changed-files.outputs.yaml_any_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint==1.35.1
      - name: Lint changed YAML files
        run: |
          echo "${{ needs.changed-files.outputs.yaml_files }}" | xargs yamllint -c .yamllint.yaml

  kubernetes-validate:
    needs: changed-files
    if: needs.changed-files.outputs.yaml_any_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate changed Kubernetes manifests
        run: |
          echo "${{ needs.changed-files.outputs.yaml_files }}" | xargs kubeconform \
            -summary \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -kubernetes-version 1.33.0

  ingress-policy:
    needs: changed-files
    if: needs.changed-files.outputs.yaml_any_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ingress IP whitelist on changed files
        run: |
          FAILED=0
          for f in ${{ needs.changed-files.outputs.yaml_files }}; do
            if grep -Pq "kind:\s*Ingress\s*$" "$f"; then
              if ! grep -q 'whitelist-source-range' "$f"; then
                echo "FAIL: $f missing IP whitelist annotation"
                FAILED=1
              fi
            fi
          done
          exit $FAILED

  agent-docs-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml==6.0.2 pytest==8.3.3
      - name: Run agent-docs validator tests
        run: python -m pytest tests/agent-docs/ -q
      - name: Validate agent-docs contract
        run: python scripts/validate-agent-docs.py --repo-root .

  agent-identity-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml==6.0.2 pytest==8.3.3
      - name: Run agent-identity validator tests
        run: python -m pytest tests/agent-identity/ -q
      - name: Validate agent-identity contract
        run: python scripts/validate-agent-identity.py --repo-root .

  # The agent-capability contract (L03 Security guardrails). This is the
  # AUTHORITATIVE gate for all four invariants — in particular "delegation does
  # not escalate", which Kyverno cannot check at admission because it needs a
  # transitive closure over the whole agent graph. That graph lives in git, so
  # this is where it is decided.
  # Spec: docs/superpowers/specs/2026-07-13-agent-capability-classes-design.md
  agent-capability-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml==6.0.2 pytest==8.3.3
      - name: Run agent-capability validator tests
        run: python -m pytest tests/agent-capability/ -q
      - name: Validate agent-capability contract
        run: python scripts/validate-agent-capability.py --repo-root .
      # ClusterPolicy/agent-capability is GENERATED from the taxonomy. If someone
      # edits the taxonomy without regenerating (or hand-edits the policy), the
      # admission gate and the CI gate would silently disagree about what a tool
      # is allowed to do. Fail loudly instead.
      - name: Check the Kyverno policy is in sync with the taxonomy
        run: python scripts/gen-agent-capability-policy.py --check --repo-root .
      # Verify the SHIPPED policy file verbatim: every real Agent passes (a false
      # positive would wedge the kagent app on next sync), and every violating
      # fixture is denied (a false negative is a hole). One fixture per rule.
      - name: Install Kyverno CLI
        run: |
          curl -sSL -o kyverno.tar.gz \
            https://github.com/kyverno/kyverno/releases/download/v1.13.4/kyverno-cli_v1.13.4_linux_x86_64.tar.gz
          tar -xzf kyverno.tar.gz kyverno
          sudo install -m 0755 kyverno /usr/local/bin/kyverno
      - name: Verify agent-capability Kyverno policy
        run: ./tests/agent-capability/kyverno/run.sh

  # The agent action record (Observability O1). The redaction tests are the point:
  # event.data contains full tool RESPONSES, and k8s_get_resource_yaml against a
  # Secret lands its payload there verbatim. A redactor nobody tested is a redactor
  # that does not work.
  agent-audit-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml==6.0.2 pytest==8.3.3
      - name: Run agent-audit redaction tests
        run: python -m pytest tests/agent-audit/ -q
