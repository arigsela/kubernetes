name: Infracost

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

jobs:
  infracost:
    name: Cost Estimation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate baseline (base branch)
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          for root in terraform/roots/*/; do
            name=$(basename "$root")
            if [ -f "$root/providers.tf" ]; then
              infracost breakdown \
                --path="$root" \
                --terraform-init-flags="-backend=false" \
                --format=json \
                --out-file="/tmp/infracost-base-${name}.json" || true
            fi
          done

      - name: Generate diff (PR branch)
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          for root in terraform/roots/*/; do
            name=$(basename "$root")
            if [ -f "$root/providers.tf" ]; then
              base_file="/tmp/infracost-base-${name}.json"
              if [ -f "$base_file" ]; then
                infracost diff \
                  --path="$root" \
                  --terraform-init-flags="-backend=false" \
                  --compare-to="$base_file" \
                  --format=json \
                  --out-file="/tmp/infracost-${name}.json" || true
              else
                # New root that doesn't exist on base branch
                infracost breakdown \
                  --path="$root" \
                  --terraform-init-flags="-backend=false" \
                  --format=json \
                  --out-file="/tmp/infracost-${name}.json" || true
              fi
            fi
          done

      - name: Merge and post PR comment
        run: |
          # Build args list for infracost output (one --path per file)
          args=""
          for f in /tmp/infracost-*.json; do
            [ -f "$f" ] && args="$args --path=$f"
          done
          if [ -z "$args" ]; then
            echo "No infracost output files found, skipping comment."
            exit 0
          fi
          infracost output $args \
            --format=json \
            --out-file=/tmp/infracost-combined.json
          infracost comment github \
            --path=/tmp/infracost-combined.json \
            --repo=$GITHUB_REPOSITORY \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update \
            --github-token=${{ secrets.GITHUB_TOKEN }}
