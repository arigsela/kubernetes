version: 3
automerge: false
delete_source_branch_on_merge: false

projects:
  - name: asela-cluster
    dir: terraform/roots/asela-cluster
    workspace: default
    autoplan:
      when_modified:
        - "**/*.tf"
        - "**/*.tfvars"
        - "../../modules/**/*.tf"
        - "../../policies/**/*.rego"
      enabled: true
    apply_requirements:
      - approved
      - mergeable

workflows:
  default:
    plan:
      steps:
        - init
        - plan:
            extra_args: ["-out=plan.tfplan"]
        - show
        - run: conftest test $SHOWFILE -p $BASE_REPO_DIR/policies/ --no-fail
    apply:
      steps:
        - apply:
            extra_args: ["plan.tfplan"]
