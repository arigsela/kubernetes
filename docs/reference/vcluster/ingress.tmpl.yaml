# Apply with: NAME=<name> envsubst < ingress.tmpl.yaml | kubectl apply -f -
# nginx terminates TLS at the edge with the vcluster-tls (Let's Encrypt) secret
# and proxies HTTPS to the vcluster Service. kubectl trusts the chain via OS CA bundle.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vcluster
  namespace: vcluster-${NAME}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${NAME}.vcluster.arigsela.com
      secretName: vcluster-tls
  rules:
    - host: ${NAME}.vcluster.arigsela.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vcluster
                port:
                  number: 443
