# Apply with: NAME=<name> envsubst < certificate.tmpl.yaml | kubectl apply -f -
# Issues a Let's Encrypt cert via DNS-01 (Route 53) for the per-vcluster hostname.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vcluster-tls
  namespace: vcluster-${NAME}
spec:
  secretName: vcluster-tls
  issuerRef:
    name: letsencrypt-route53
    kind: ClusterIssuer
  commonName: ${NAME}.vcluster.arigsela.com
  dnsNames:
    - ${NAME}.vcluster.arigsela.com
